<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة جامع الأمير فواز - ضبط المسافات</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { 
            --gold-3d: #FFD700; 
            --gold-dark: #8B7500;
            --white: #F5F5F5; 
            --text-shadow-deep: 3px 3px 10px rgba(0, 0, 0, 0.8);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        
        body { 
            background-color: #000; width: 100vw; height: 100vh; 
            overflow: hidden; display: flex; align-items: center; justify-content: center; 
        }

        .main-container {
            transform: rotate(90deg);
            width: 100vh; height: 100vw;
            display: flex; flex-direction: column;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)), 
                        url("bg.png") center/cover no-repeat;
            position: absolute; border: 4px solid var(--gold-3d);
        }

        /* 1. الجزء العلوي - تم إنزاله ليبتعد عن الإطار */
        .top-section {
            height: 32vh; 
            display: flex; flex-direction: column;
            justify-content: flex-start; text-align: center;
            padding-top: 8vh; /* زيادة المسافة من الأعلى ليبتعد عن الإطار */
        }
        .mosque-name { 
            font-family: 'Amiri', serif; font-size: 7.5vh; color: var(--white); 
            text-shadow: 0 0 25px var(--gold-3d), 2px 2px 5px #000; 
        }
        .date-info { 
            font-size: 2.8vh; color: var(--gold-3d); font-weight: 700; margin-top: 1.5vh;
            text-shadow: 2px 2px 4px #000;
        }
        
        .clock-area { display: flex; align-items: center; justify-content: center; gap: 2vw; margin-top: 3vh; }
        #clock { 
            font-size: 16vh; font-weight: 900; color: var(--gold-3d); line-height: 0.8; 
            text-shadow: 4px 4px 10px rgba(0, 0, 0, 0.9);
        }
        #ampm { font-size: 5.5vh; color: var(--white); font-weight: 800; text-shadow: 2px 2px 8px #000; }

        /* 2. الجزء الأوسط: الأذكار */
        .zikr-section {
            flex: 1; display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 0 5vw;
        }
        #zikr { 
            font-size: 7vh; font-weight: 800; color: var(--white); 
            text-shadow: var(--text-shadow-deep); 
            line-height: 1.3;
        }

        /* 3. الجزء السفلي - تم رفعه للأعلى بمقدار إضافي (2 سم) */
        .prayer-section {
            height: 55vh; 
            display: flex; flex-direction: column;
            border-top: 4px solid var(--gold-3d); 
            background: rgba(0, 0, 0, 0.45); 
            backdrop-filter: blur(8px);
            margin-top: -12vh; /* زيادة السحب للأعلى للابتعاد عن الحافة السفلية */
            padding-bottom: 5vh; /* إضافة مساحة داخلية سفلية لرفع المحتوى */
            position: relative;
            z-index: 10;
        }

        .next-prayer-box {
            background: rgba(255, 215, 0, 0.15);
            padding: 1.5vh; border-bottom: 2px solid var(--gold-3d);
            text-align: center;
        }
        #timer-label { font-size: 3.5vh; color: var(--white); font-weight: 700; text-shadow: 2px 2px 4px #000; }
        #timer { font-size: 8.5vh; color: var(--gold-3d); font-weight: 900; letter-spacing: 4px; text-shadow: 3px 3px 6px #000; }

        .prayer-grid {
            flex: 1; display: grid; grid-template-columns: 1fr 1fr;
            padding: 2vh 0;
        }
        .prayer-col { display: flex; flex-direction: column; justify-content: space-around; }
        .v-line { border-left: 2px solid rgba(255, 215, 0, 0.25); }

        .prayer-item { display: flex; justify-content: space-between; align-items: center; padding: 0 4vw; }
        .p-name { font-size: 5vh; color: var(--white); font-weight: 800; text-shadow: 2px 2px 5px #000; }
        
        .p-val-box { display: flex; align-items: baseline; }
        .p-val { font-size: 7vh; color: var(--gold-3d); font-weight: 900; text-shadow: 3px 3px 6px #000; }
        .p-suf { font-size: 3.5vh; color: var(--white); margin-right: 10px; font-weight: 700; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="top-section">
        <div class="mosque-name">جامع الأمير فواز</div>
        <div class="date-info"><span id="hijri">--</span> | <span id="miladi">--</span></div>
        <div class="clock-area">
            <div id="clock">00:00</div>
            <div id="ampm">--</div>
        </div>
    </div>

    <div class="zikr-section">
        <div id="zikr">أستغفر الله العظيم وأتوب إليه</div>
    </div>

    <div class="prayer-section">
        <div class="next-prayer-box">
            <span id="timer-label">الصلاة القادمة بعد: </span>
            <span id="timer">00:00:00</span>
        </div>
        <div class="prayer-grid">
            <div class="prayer-col v-line" id="rCol"></div>
            <div class="prayer-col" id="lCol"></div>
        </div>
    </div>
</div>

<script>
    const prayerData = [
        {n: "الفجر", h: 5, m: 10}, {n: "الشروق", h: 6, m: 34}, {n: "الظهر", h: 12, m: 20},
        {n: "العصر", h: 15, m: 34}, {n: "المغرب", h: 18, m: 6}, {n: "العشاء", h: 19, m: 31}
    ];

    const azkar = ["سبحان الله وبحمده، سبحان الله العظيم", "اللهم صلِّ وسلم على نبينا محمد", "لا حول ولا قوة إلا بالله العلي العظيم", "أستغفر الله العظيم وأتوب إليه"];

    function fmt12(h, m) {
        let s = h >= 12 ? "م" : "ص";
        let h12 = h % 12 || 12;
        return `<div class="p-val-box"><span class="p-val">${String(h12).padStart(2,'0')}:${String(m).padStart(2,'0')}</span><span class="p-suf">${s}</span></div>`;
    }

    function init() {
        const r = document.getElementById("rCol"), l = document.getElementById("lCol");
        r.innerHTML = ""; l.innerHTML = "";
        prayerData.forEach((p, i) => {
            const h = `<div class="prayer-item"><div class="p-name">${p.n}</div>${fmt12(p.h, p.m)}</div>`;
            if (i < 3) r.innerHTML += h; else l.innerHTML += h;
        });
    }

    function update() {
        const now = new Date();
        let hrs = now.getHours(), min = now.getMinutes();
        let ampmStr = hrs >= 12 ? "مساءً" : "صباحاً";
        let hrs12 = hrs % 12 || 12;
        document.getElementById("clock").innerText = `${String(hrs12).padStart(2,'0')}:${String(min).padStart(2,'0')}`;
        document.getElementById("ampm").innerText = ampmStr;

        document.getElementById("miladi").innerText = now.toLocaleDateString('ar-SA', {day:'numeric', month:'long', year:'numeric'});
        document.getElementById("hijri").innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', {day:'numeric', month:'long', year:'numeric'}).format(now);

        let cur = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();
        let next = 0;
        for(let p of prayerData) {
            let ps = p.h*3600 + p.m*60;
            if(ps > cur) { next = ps; break; }
        }
        if(!next) next = prayerData[0].h*3600 + prayerData[0].m*60 + 86400;
        let diff = next - cur;
        let h = Math.floor(diff/3600), m = Math.floor((diff%3600)/60), s = diff%60;
        document.getElementById("timer").innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    init(); update(); setInterval(update, 1000);
    let z = 0; setInterval(() => { 
        const zElem = document.getElementById("zikr");
        zElem.style.opacity = 0;
        setTimeout(() => { zElem.innerText = azkar[++z % azkar.length]; zElem.style.opacity = 1; }, 15000);
    }, 16000);
</script>
</body>
</html>
