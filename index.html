<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة مسجد الأمير فواز</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: var(--text-white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* الجزء العلوي: الاسم والساعة */
        .top-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: linear-gradient(to bottom, #111, transparent);
        }

        .masjid-name {
            font-size: 3rem;
            color: var(--gold);
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .clocks-container {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        /* ساعة العقارب */
        .analog-clock {
            width: 120px;
            height: 120px;
            border: 4px solid var(--gold);
            border-radius: 50%;
            position: relative;
            background: #fff;
        }
        .analog-clock div { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; border-radius: 10px; }
        .hour { width: 4px; height: 30px; background: #333; z-index: 3; }
        .minute { width: 3px; height: 45px; background: #666; z-index: 2; }
        .second { width: 2px; height: 50px; background: red; z-index: 1; }

        .digital-clock {
            font-size: 4rem;
            font-family: 'Courier New', Courier, monospace;
            color: var(--gold);
        }

        /* المنتصف: الذكر والتاريخ */
        .middle-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .dhikr {
            font-size: 5rem;
            margin-bottom: 20px;
            color: #eee;
            animation: pulse 4s infinite;
        }

        .date-container {
            font-size: 2rem;
            background: rgba(212, 175, 55, 0.1);
            padding: 10px 40px;
            border-radius: 50px;
            border: 1px solid var(--gold);
        }

        /* الأسفل: مواقيت الصلاة */
        .bottom-section {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
            padding: 30px;
            background: var(--card-bg);
        }

        .prayer-card {
            background: #222;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid transparent;
            transition: 0.5s;
        }

        .prayer-card.active {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.2);
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--gold);
        }

        .prayer-name { font-size: 1.8rem; color: var(--gold); margin-bottom: 10px; }
        .prayer-time { font-size: 2.5rem; font-weight: bold; }
        .iqama-time { font-size: 1.2rem; color: #888; margin-top: 10px; }

        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }
        }
    </style>
</head>
<body>

    <!-- 1️⃣ الجزء العلوي -->
    <div class="top-section">
        <div class="masjid-name">مسجد الأمير فواز</div>
        <div class="clocks-container">
            <div class="analog-clock">
                <div class="hour" id="h-hand"></div>
                <div class="minute" id="m-hand"></div>
                <div class="second" id="s-hand"></div>
            </div>
            <div class="digital-clock" id="digi-clock">00:00:00</div>
        </div>
    </div>

    <!-- 2️⃣ الجزء الأوسط -->
    <div class="middle-section">
        <div class="dhikr">أستغفر الله العظيم</div>
        <div class="date-container">
            <span id="day-name"></span> | 
            <span id="h-date"></span> هـ | 
            <span id="m-date"></span> م
        </div>
    </div>

    <!-- 3️⃣ الجزء السفلي -->
    <div class="bottom-section" id="prayer-list">
        <!-- سيتم تعبئتها بواسطة JS -->
    </div>

    <script>
        // إعدادات مواقيت الصلاة (يمكن تعديلها يدوياً هنا)
        const prayerData = [
            { name: "الفجر", time: "05:15", iqama: "20" },
            { name: "الشروق", time: "06:35", iqama: "-" },
            { name: "الظهر", time: "12:30", iqama: "15" },
            { name: "العصر", time: "15:50", iqama: "15" },
            { name: "المغرب", time: "18:25", iqama: "10" },
            { name: "العشاء", time: "19:55", iqama: "20" }
        ];

        function updateClock() {
            const now = new Date();
            
            // ساعة العقارب
            const s = now.getSeconds();
            const m = now.getMinutes();
            const h = now.getHours();
            document.getElementById('s-hand').style.transform = `rotate(${s * 6}deg)`;
            document.getElementById('m-hand').style.transform = `rotate(${m * 6}deg)`;
            document.getElementById('h-hand').style.transform = `rotate(${h * 30 + m/2}deg)`;

            // الساعة الرقمية
            document.getElementById('digi-clock').innerText = now.toLocaleTimeString('en-GB');

            highlightNextPrayer(h, m);
        }

        function highlightNextPrayer(h, m) {
            const currentTime = h * 60 + m;
            let nextIndex = 0;

            for (let i = 0; i < prayerData.length; i++) {
                const [pHour, pMin] = prayerData[i].time.split(':').map(Number);
                if (currentTime < (pHour * 60 + pMin)) {
                    nextIndex = i;
                    break;
                }
            }

            const cards = document.querySelectorAll('.prayer-card');
            cards.forEach((card, index) => {
                card.classList.toggle('active', index === nextIndex);
            });
        }

        function initApp() {
            // عرض المواقيت
            const container = document.getElementById('prayer-list');
            prayerData.forEach(p => {
                container.innerHTML += `
                    <div class="prayer-card">
                        <div class="prayer-name">${p.name}</div>
                        <div class="prayer-time">${p.time}</div>
                        <div class="iqama-time">الإقامة: ${p.iqama} د</div>
                    </div>
                `;
            });

            // التاريخ
            const now = new Date();
            const days = ["الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
            document.getElementById('day-name').innerText = days[now.getDay()];
            document.getElementById('m-date').innerText = now.toLocaleDateString('ar-SA-u-nu-latn').split(' ')[0];
            
            // حساب هجري تقريبي (لأن العمل أوفلاين)
            const hijri = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-uma-nu-latn', {day:'numeric', month:'long', year:'numeric'}).format(now);
            document.getElementById('h-date').innerText = hijri;

            setInterval(updateClock, 1000);
            updateClock();
        }

        initApp();
    </script>
</body>
</html>
