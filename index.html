<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جامع الأمير فواز</title>
    <style>
        :root { --gold: #dfbd69; --bg: #000; --box: #111; --border: #333; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg); color: white; font-family: 'Arial', sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden; padding: 30px;
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com');
            background-size: cover; background-position: center;
        }

        /* تقسيم الشاشة لـ 3 أقسام رئيسية */
        .main-container { display: grid; grid-template-columns: 1fr 1.5fr; flex-grow: 1; gap: 40px; }

        /* الجانب الأيمن (الاسم والذكر) */
        .right-side { display: flex; flex-direction: column; justify-content: space-between; align-items: flex-start; }
        .mosque-title { font-size: 5.5rem; color: var(--gold); font-weight: bold; margin-top: 10px; }
        .dhikr-area { display: flex; align-items: center; gap: 30px; margin-bottom: 50px; }
        .dhikr-line { width: 12px; height: 140px; background: var(--gold); border-radius: 6px; }
        #dhikr-text { font-size: 7rem; font-weight: bold; line-height: 1.2; }

        /* الجانب الأيسر (الساعات والتواريخ) */
        .left-side { display: flex; flex-direction: column; align-items: center; justify-content: space-between; }
        .clock-box { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .analog { width: 160px; height: 160px; border: 5px solid var(--gold); border-radius: 50%; position: relative; }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; border-radius: 10px; }
        .hour { width: 6px; height: 45px; background: white; }
        .min { width: 4px; height: 65px; background: #bbb; }
        .sec { width: 2px; height: 75px; background: var(--gold); }
        .digital { font-size: 6rem; color: var(--gold); background: var(--box); padding: 10px 50px; border-radius: 15px; border: 1px solid var(--border); font-weight: bold; }
        
        .dates-container { display: flex; flex-direction: column; gap: 15px; width: 100%; align-items: center; }
        .date-item { background: var(--box); font-size: 2.2rem; padding: 12px 30px; border-radius: 10px; border: 1px solid var(--border); width: 90%; text-align: center; }

        /* الجزء السفلي (مواقيت الصلاة) */
        .prayer-section { margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px; }
        .prayer-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 15px; }
        .p-card { border: 2px solid var(--border); border-radius: 15px; text-align: center; padding: 15px; background: rgba(15,15,15,0.9); position: relative; }
        .p-card.active { border-color: var(--gold); background: rgba(223, 189, 105, 0.2); transform: scale(1.05); }
        .next-tag { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; padding: 2px 15px; border-radius: 6px; font-size: 1rem; font-weight: bold; display: none; }
        .active .next-tag { display: block; }
        .p-name { font-size: 1.8rem; color: #aaa; margin-bottom: 5px; }
        .active .p-name { color: white; font-weight: bold; }
        .p-time { font-size: 2.5rem; font-weight: bold; }

        .iqama-row { display: flex; justify-content: center; }
        .iqama-bar { background: var(--gold); color: black; font-size: 3rem; font-weight: bold; padding: 10px 100px; border-radius: 15px; width: 70%; text-align: center; }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- يمين: اسم الجامع والذكر -->
        <div class="right-side">
            <h1 class="mosque-title">جَامِع الأَمير فَواز</h1>
            <div class="dhikr-area">
                <div class="dhikr-line"></div>
                <div id="dhikr-text">أستغفر الله العظيم</div>
            </div>
        </div>

        <!-- يسار: الساعات والتواريخ -->
        <div class="left-side">
            <div class="clock-box">
                <div class="analog">
                    <div class="hand hour" id="h-hand"></div>
                    <div class="hand min" id="m-hand"></div>
                    <div class="hand sec" id="s-hand"></div>
                </div>
                <div class="digital" id="digi-clock">00:00 ص</div>
            </div>
            <div class="dates-container">
                <div class="date-item" id="g-date">-- --- 2026 م</div>
                <div class="date-item" id="h-date">-- --- 1447 هـ</div>
            </div>
        </div>
    </div>

    <!-- الأسفل: مواقيت الصلاة والإقامة -->
    <div class="prayer-section">
        <div class="prayer-grid" id="prayer-grid"></div>
        <div class="iqama-row">
            <div class="iqama-bar" id="iqama-text">الإقامة بعد: 10:00 د</div>
        </div>
    </div>

    <script>
        const dhikrs = ["أستغفر الله العظيم", "لا إله إلا الله", "سبحان الله وبحمده", "صلّ على محمد", "الحمد لله رب العالمين"];
        let dIdx = 0;
        setInterval(() => {
            const el = document.getElementById('dhikr-text');
            el.style.opacity = 0;
            setTimeout(() => {
                dIdx = (dIdx + 1) % dhikrs.length;
                el.innerText = dhikrs[dIdx];
                el.style.opacity = 1;
            }, 800);
        }, 30000);

        async function fetchPrayers() {
            try {
                const res = await fetch('https://api.aladhan.com');
                const data = await res.json();
                const t = data.data.timings;
                updatePrayerGrid([
                    {n: "الفجر", t: t.Fajr}, {n: "الشروق", t: t.Sunrise}, {n: "الظهر", t: t.Dhuhr},
                    {n: "العصر", t: t.Asr}, {n: "المغرب", t: t.Maghrib}, {n: "العشاء", t: t.Isha}
                ]);
            } catch(e) { console.log("خطأ في جلب المواقيت"); }
        }

        function format12(t24) {
            let [h, m] = t24.split(':'); h = parseInt(h);
            const s = h >= 12 ? 'م' : 'ص';
            return `${h % 12 || 12}:${m} ${s}`;
        }

        function updatePrayerGrid(list) {
            const grid = document.getElementById('prayer-grid');
            grid.innerHTML = '';
            const now = new Date();
            const currMin = now.getHours() * 60 + now.getMinutes();
            let nextIdx = 0;

            for(let i=0; i<list.length; i++){
                const [h, m] = list[i].t.split(':').map(Number);
                if(currMin < (h * 60 + m)) { nextIdx = i; break; }
            }

            list.forEach((p, i) => {
                const active = i === nextIdx ? 'active' : '';
                grid.innerHTML += `
                    <div class="p-card ${active}">
                        <div class="next-tag">الصلاة القادمة</div>
                        <div class="p-name">${p.n}</div>
                        <div class="p-time">${format12(p.t)}</div>
                    </div>`;
            });
        }

        function updateTime() {
            const now = new Date();
            let h = now.getHours();
            const ampm = h >= 12 ? 'م' : 'ص';
            document.getElementById('digi-clock').innerText = `${String(h % 12 || 12).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')} ${ampm}`;
            
            document.getElementById('s-hand').style.transform = `rotate(${now.getSeconds()*6}deg)`;
            document.getElementById('m-hand').style.transform = `rotate(${now.getMinutes()*6}deg)`;
            document.getElementById('h-hand').style.transform = `rotate(${(h%12)*30 + now.getMinutes()/2}deg)`;

            const opt = { day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('g-date').innerText = now.toLocaleDateString('ar-SA', opt) + " م";
            document.getElementById('h-date').innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-uma', opt).format(now) + " هـ";
        }

        setInterval(updateTime, 1000);
        updateTime();
        fetchPrayers();
        setInterval(fetchPrayers, 3600000);
    </script>
</body>
</html>
