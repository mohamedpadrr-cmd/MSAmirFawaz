<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>جامع الأمير فواز - جدة</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #000;
  color: #fff;
  font-family: Tahoma, Arial;
  overflow: hidden;
}

/* ===== العنوان ===== */
.header {
  text-align: center;
  padding: 20px 0;
}
.header h1 {
  margin: 0;
  font-size: 64px;
}
.header h2 {
  margin-top: 8px;
  font-size: 38px;
  color: #d4af37;
}

/* ===== المنتصف ===== */
.center {
  text-align: center;
  margin: 10px 0;
}
.zikr {
  font-size: 46px;
  margin-bottom: 10px;
}
.date {
  font-size: 34px;
  color: #ccc;
}

/* ===== جدول الصلاة ===== */
.table {
  width: 80%;
  margin: 20px auto;
  font-size: 46px;
}
.row {
  display: flex;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid #333;
}
.iqama {
  font-size: 28px;
  color: #aaa;
}
</style>
</head>

<body>

<!-- ===== العنوان ===== -->
<div class="header">
  <h1>جامع الأمير فواز</h1>
  <h2>جدة</h2>
</div>

<!-- ===== المنتصف ===== -->
<div class="center">
  <div class="zikr" id="zikr"></div>
  <div class="date" id="date"></div>
</div>

<!-- ===== جدول الصلاة ===== -->
<div class="table" id="prayers"></div>

<script>
/* ===== الأذكار (تتغير كل 30 ثانية) ===== */
const azkar = [
  "أستغفر الله العظيم",
  "سبحان الله وبحمده",
  "لا إله إلا الله",
  "اللهم صل وسلم على نبينا محمد",
  "سبحان الله والحمد لله ولا إله إلا الله والله أكبر"
];

let zikrIndex = 0;
function rotateZikr() {
  document.getElementById("zikr").innerText = azkar[zikrIndex];
  zikrIndex = (zikrIndex + 1) % azkar.length;
}
rotateZikr();
setInterval(rotateZikr, 30000);

/* ===== التاريخ (ميلادي + هجري + اليوم) ===== */
const today = new Date();
const days = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];

const greg = today.toLocaleDateString("ar-SA");
const hijri = today.toLocaleDateString("ar-SA-u-ca-islamic");
document.getElementById("date").innerText =
  `${days[today.getDay()]} | ${greg} | ${hijri}`;

/* ===== جدول مواقيت الصلاة (سنة 2026) =====
الصيغة:
"YYYY-MM-DD": ["الفجر","الشروق","الظهر","العصر","المغرب","العشاء"]
*/
const timetable = {
  // مثال (اختباري فقط – يجب استبداله بالجدول الرسمي)
  "2026-01-01": ["05:45","07:05","12:35","15:55","18:25","19:55"]
};

function addMinutes(time, mins) {
  const [h,m] = time.split(":").map(Number);
  const d = new Date();
  d.setHours(h, m + mins);
  return d.toTimeString().slice(0,5);
}

const key = today.toISOString().slice(0,10);
const t = timetable[key];

if (t) {
  document.getElementById("prayers").innerHTML = `
    <div class="row"><span>الفجر</span><span>${t[0]} <span class="iqama">الإقامة ${addMinutes(t[0],10)}</span></span></div>
    <div class="row"><span>الشروق</span><span>${t[1]}</span></div>
    <div class="row"><span>الظهر</span><span>${t[2]} <span class="iqama">الإقامة ${addMinutes(t[2],10)}</span></span></div>
    <div class="row"><span>العصر</span><span>${t[3]} <span class="iqama">الإقامة ${addMinutes(t[3],10)}</span></span></div>
    <div class="row"><span>المغرب</span><span>${t[4]} <span class="iqama">الإقامة ${addMinutes(t[4],10)}</span></span></div>
    <div class="row"><span>العشاء</span><span>${t[5]} <span class="iqama">الإقامة ${addMinutes(t[5],10)}</span></span></div>
  `;
} else {
  document.getElementById("prayers").innerText =
    "مواقيت هذا اليوم غير مدخلة";
}
</script>

</body>
</html>
