<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شاشة جامع الأمير فواز</title>
<style>
:root{
--gold:#D4AF37;
--white:#F5F5F5;
--glass:rgba(0,0,0,0.35);
--iqama-color: #00FFCC;
}

*{ margin:0; padding:0; box-sizing:border-box; font-family:'Tajawal',sans-serif; }

body{
background:#000;
width:100vw; height:100vh;
overflow:hidden;
display:flex; align-items:center; justify-content:center;
}

.main-container{
transform:rotate(90deg);
width:100vh; height:100vw;
display:flex; flex-direction:column;
background: linear-gradient(rgba(0,0,0,.2),rgba(0,0,0,.4)), url("bg.png") center/cover no-repeat;
position:absolute;
}

/* القسم العلوي - مزاح للأسفل 2 سم */
.top-section{
height:28vh;
display:flex; flex-direction:column;
align-items:center; justify-content:center;
gap:1vh; 
margin-top: calc(2vh + 2cm); 
}

.name-box{
background:var(--glass);
backdrop-filter:blur(8px);
padding:1vh 3vw; border-radius:20px;
border:1px solid rgba(212,175,55,.3);
text-align:center; min-width: 45vh;
}

.mosque-name{ font-size:4.2vh; color:white; text-shadow:0 0 20px var(--gold); }
.date-container { border-top: 1px solid rgba(212,175,55,0.2); padding-top: 5px; }
.date-info{ font-size:2.5vh; color:var(--gold); font-weight:700; }
.date-info.miladi { color: #fff; font-size: 2vh; opacity: 0.8; }

.clock-box{
background:var(--glass); backdrop-filter:blur(8px);
padding:1vh 4vw; border-radius:20px;
border:1px solid rgba(212,175,55,.3);
display:flex; align-items:center; gap:1.5vw;
}
#clock{ font-size:9vh; font-weight:900; color:var(--gold); text-shadow:0 0 10px #000; }
#ampm{ font-size:3.2vh; color:white; }

/* قسم الأحاديث مع التوهج */
.zikr-section{
flex: 1; 
display:flex; align-items:center; justify-content:center;
padding: 0 6vw;
}
#zikr{ 
font-size:4.2vh; 
font-weight:800; 
color:white; 
text-shadow: 0 0 15px rgba(212,175,55,0.8), 0 0 30px rgba(0,0,0,0.8);
text-align:center; 
line-height: 1.4;
transition: opacity 1s;
}

/* قسم الصلوات - تم إنزاله بمقدار نص سم عن التعديل السابق */
.prayer-section{
width: 100%;
display:flex; flex-direction:column;
background:rgba(0,0,0,0.65);
backdrop-filter:blur(15px);
border-top:3px solid var(--gold);
padding-bottom: 1.5vh;
margin-bottom: 1.5cm; /* كانت 2 سم وأصبحت 1.5 سم لينزل القسم للأسفل */
}

.next-prayer-box{
background:rgba(212,175,55,0.15);
padding:0.5vh; text-align:center;
border-bottom:1px solid var(--gold);
margin-bottom: 0.5vh;
}
#timer-label{ font-size:2.8vh; color:white; }
#timer{ font-size:6vh; color:var(--gold); font-weight:900; }

.iqama-mode { background: rgba(0, 255, 204, 0.2) !important; }
.iqama-mode #timer { color: var(--iqama-color) !important; text-shadow: 0 0 20px var(--iqama-color); }
.iqama-mode #timer-label { color: var(--iqama-color) !important; }

.prayer-header {
display: grid; grid-template-columns: 1.5fr 1fr 1fr;
padding: 1vh 5vw; color: var(--gold);
font-size: 2.2vh; font-weight: bold; text-align: center;
}

.prayer-grid{ 
display:flex; flex-direction: column; 
gap: 0.5cm; 
padding: 0 3vw;
}

.prayer-item{ 
display: grid; 
grid-template-columns: 1.5fr 1fr 1fr; 
align-items:center; 
padding: 0.8vh 2vw; 
text-align: center; 
border-radius: 10px;
}

.p-name{ font-size:3.8vh; color:white; font-weight:800; text-align: right; padding-right: 5vw; }
.p-val{ font-size:4.2vh; color:var(--gold); font-weight:900; }
.iqama-val { font-size:3.8vh; color: var(--iqama-color); font-weight: 800; }

.next-prayer{ 
background:rgba(212,175,55,0.25); 
box-shadow: inset 0 0 15px rgba(212,175,55,0.2);
}
</style>
</head>
<body>
<div class="main-container">
    <div class="top-section">
        <div class="name-box">
            <div class="mosque-name">جامع الأمير فواز</div>
            <div class="date-container">
                <div id="hijri" class="date-info">--</div>
                <div id="miladi" class="date-info miladi">--</div>
            </div>
        </div>
        <div class="clock-box">
            <div id="clock">00:00</div>
            <div id="ampm">--</div>
        </div>
    </div>

    <div class="zikr-section">
        <div id="zikr">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
    </div>

    <div class="prayer-section">
        <div class="next-prayer-box" id="timerBox">
            <span id="timer-label">الصلاة القادمة بعد</span>
            <span id="timer">00:00:00</span>
        </div>
        <div class="prayer-header">
            <div style="text-align: right; padding-right: 5vw;">الصلاة</div>
            <div>الأذان</div>
            <div>الإقامة</div>
        </div>
        <div class="prayer-grid" id="prayerContainer"></div>
    </div>
</div>

<script>
const prayerData=[
    {n:"الفجر", h:5, m:10, iqama:25},
    {n:"الشروق", h:6, m:34, iqama:0},
    {n:"الظهر", h:12, m:20, iqama:15},
    {n:"العصر", h:15, m:34, iqama:15},
    {n:"المغرب", h:18, m:6, iqama:10},
    {n:"العشاء", h:19, m:31, iqama:20}
];

const azkar=[
    "قَالَ ﷺ: «مَنْ صَلَّى الْبَرْدَيْنِ دَخَلَ الْجَنَّةَ» [رواه البخاري ومسلم]",
    "قَالَ ﷺ: «مَنْ بَنَى مَسْجِدًا لِلَّهِ بَنَى اللَّهُ لَهُ فِي الْجَنَّةِ مِثْلَهُ» [رواه مسلم]",
    "قَالَ ﷺ: «كَلِمَتَانِ خَفِيفَتَانِ عَلَى اللِّسَانِ ثَقِيلَتَانِ فِي الْمِيزَانِ: سُبْحَانَ اللَّهِ وَبِحَمْدِهِ سُبْحَانَ اللَّهِ الْعَظِيمِ» [البخاري]",
    "قَالَ ﷺ: «أَحَبُّ الْكَلامِ إِلَى اللَّهِ أَرْبَعٌ: سُبْحَانَ اللَّهِ وَالْحَمْدُ لِلَّهِ وَلا إِلَهَ إِلا اللَّهُ وَاللَّهُ أَكْبَرُ» [رواه مسلم]",
    "قَالَ ﷺ: «مَنْ صَلَّى عَلَيَّ صَلاةً صَلَّى اللَّهُ عَلَيْهِ بِهَا عَشْرًا» [رواه مسلم]",
    "قَالَ ﷺ: «الدُّعَاءُ لا يُرَدُّ بَيْنَ الأَذَانِ وَالإِقَامَةِ» [رواه الترمذي]",
    "قَالَ ﷺ: «مَنْ سَلَكَ طَرِيقًا يَلْتَمِسُ فِيهِ عِلْمًا سَهَّلَ اللَّهُ لَهُ بِهِ طَرِيقًا إِلَى الْجَنَّةِ» [رواه مسلم]",
    "قَالَ ﷺ: «خَيْرُكُمْ مَنْ تَعَلَّمَ الْقُرْآنَ وَعَلَّمَهُ» [رواه البخاري]",
    "قَالَ ﷺ: «مَنْ قَرَأَ آيَةَ الْكُرْسِيِّ دُبُرَ كُلِّ صَلاةٍ مَكْتُوبَةٍ لَمْ يَمْنَعْهُ مِنْ دُخُولِ الْجَنَّةِ إِلا الْمَوْتُ» [صحيح الجامع]",
    "قَالَ ﷺ: «أَحَبُّ الأَعْمَالِ إِلَى اللَّهِ أَدْوَمُهَا وَإِنْ قَلَّ» [رواه البخاري ومسلم]",
    "قَالَ ﷺ: «إِنَّمَا الأَعْمَالُ بِالنِّيَّاتِ، وَإِنَّمَا لِكُلِّ امْرِئٍ مَا نَوَى» [البخاري ومسلم]",
    "قَالَ ﷺ: «لا يُؤْمِنُ أَحَدُكُمْ حَتَّى يُحِبَّ لأَخِيهِ مَا يُحِبُّ لِنَفْسِهِ» [البخاري ومسلم]",
    "قَالَ ﷺ: «بَشِّرِ الْمَشَّائِينَ فِي الظُّلَمِ إِلَى الْمَسَاجِدِ بِالنُّورِ التَّامِّ يَوْمَ الْقِيَامَةِ» [رواه الترمذي]",
    "قَالَ ﷺ: «مَنْ تَوَضَّأَ فَأَحْسَنَ الْوُضُوءَ خَرَجَتْ خَطَايَاهُ مِنْ جَسَدِهِ حَتَّى تَخْرُجَ مِنْ تَحْتِ أَظْفَارِهِ» [رواه مسلم]",
    "قَالَ ﷺ: «مَنْ صَلَّى الْعِشَاءَ فِي جَمَاعَةٍ فَكَأَنَّمَا قَامَ نِصْفَ اللَّيْلِ» [رواه مسلم]",
    "قَالَ ﷺ: «مَا اجْتَمَعَ قَوْمٌ فِي بَيْتٍ مِنْ بُيُوتِ اللَّهِ يَتْلُونَ كِتَابَ اللَّهِ... إِلا نَزَلَتْ عَلَيْهِمُ السَّكِينَةُ» [مسلم]",
    "قَالَ ﷺ: «لأَنْ أَقُولَ سُبْحَانَ اللَّهِ، وَالْحَمْدُ لِلَّهِ، وَلا إِلَهَ إِلا اللَّهُ، وَاللَّهُ أَكْبَرُ، أَحَبُّ إِلَيَّ مِمَّا طَلَعَتْ عَلَيْهِ الشَّمْسُ» [مسلم]",
    "قَالَ ﷺ: «مَنْ تَوَضَّأَ لِلصَّلاةِ فَأَسْبَغَ الْوُضُوءَ ثُمَّ مَشَى إِلَى الصَّلاةِ الْمَكْتُوبَةِ... غَفَرَ اللَّهُ لَهُ ذُنُوبَهُ» [مسلم]",
    "قَالَ ﷺ: «إِذَا نُودِيَ بِالصَّلاةِ فُتِحَتْ أَبْوَابُ السَّمَاءِ وَاسْتُجِيبَ الدُّعَاءُ» [رواه الحاكم]",
    "قَالَ ﷺ: «مَنْ قَرَأَ حَرْفًا مِنْ كِتَابِ اللَّهِ فَلَهُ بِهِ حَسَنَةٌ، وَالْحَسَنَةُ بِعَشْرِ أَمْثَالِهَا» [الترمذي]",
    "قَالَ ﷺ: «أَقْرَبُ مَا يَكُونُ الْعَبْدُ مِنْ رَبِّهِ وَهُوَ سَاجِدٌ، فَأكْثِرُوا الدُّعَاءَ» [رواه مسلم]",
    "قَالَ ﷺ: «مَنْ سَبَّحَ اللَّهَ فِي دُبُرِ كُلِّ صَلاةٍ ثَلاثًا وَثَلاثِينَ... غُفِرَتْ خَطَايَاهُ وَإِنْ كَانَتْ مِثْلَ زَبَدِ الْبَحْرِ» [مسلم]",
    "قَالَ ﷺ: «تَبَسُّمُكَ فِي وَجْهِ أَخِيكَ لَكَ صَدَقَةٌ» [الترمذي]",
    "قَالَ ﷺ: «اتَّقِ اللَّهَ حَيْثُمَا كُنْتَ، وَأَتْبِعِ السَّيِّئَةَ الْحَسَنَةَ تَمْحُهَا» [الترمذي]",
    "قَالَ ﷺ: «الطُّهُورُ شَطْرُ الإِيمَانِ، وَالْحَمْدُ لِلَّهِ تَمْلأُ الْمِيزَانَ» [مسلم]",
    "قَالَ ﷺ: «مَنْ كَانَ يُؤْمِنُ بِاللَّهِ وَالْيَوْمِ الآخِرِ فَلْيَقُلْ خَيْرًا أَوْ لِيَصْمُتْ» [البخاري ومسلم]",
    "قَالَ ﷺ: «أَحَبُّ النَّاسِ إِلَى اللَّهِ أَنْفَعُهُمْ لِلنَّاسِ» [رواه الطبراني]",
    "قَالَ ﷺ: «مَنْ صَلَّى لِلَّهِ ثِنْتَيْ عَشْرَةَ رَكْعَةً تَطَوُّعًا... بَنَى اللَّهُ لَهُ بَيْتًا فِي الْجَنَّةِ» [مسلم]",
    "قَالَ ﷺ: «الْمُسْلِمُ مَنْ سَلِمَ الْمُسْلِمُونَ مِنْ لِسَانِهِ وَيَدِهِ» [البخاري ومسلم]",
    "قَالَ ﷺ: «إِنَّ اللَّهَ لا يَنْظُرُ إِلَى صُوَرِكُمْ وَأَمْوَالِكُمْ، وَلَكِنْ يَنْظُرُ إِلَى قُلُوبِكُمْ وَأَعْمَالِكُمْ» [مسلم]"
];

function formatTime(h, m) {
    let h12 = h % 12 || 12;
    return `${String(h12).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function calculateIqama(h, m, offset) {
    if (offset === 0) return "--:--";
    let totalMins = h * 60 + m + offset;
    return formatTime(Math.floor(totalMins/60)%24, totalMins%60);
}

function init(){
    const container = document.getElementById("prayerContainer");
    container.innerHTML = "";
    prayerData.forEach((p, i) => {
        let suf = p.h >= 12 ? "م" : "ص";
        container.innerHTML += `
            <div class="prayer-item" id="prayer-${i}">
                <div class="p-name">${p.n}</div>
                <div class="p-val">${formatTime(p.h, p.m)} <small style="font-size:1.8vh">${suf}</small></div>
                <div class="iqama-val">${calculateIqama(p.h, p.m, p.iqama)}</div>
            </div>`;
    });
}

function update(){
    const now = new Date();
    const rDate = new Date(now.toLocaleString("en-US", {timeZone: "Asia/Riyadh"}));
    let h = rDate.getHours(), m = rDate.getMinutes(), s = rDate.getSeconds();
    
    document.getElementById("clock").innerText = formatTime(h, m);
    document.getElementById("ampm").innerText = h >= 12 ? "مساءً" : "صباحاً";
    document.getElementById("miladi").innerText = now.toLocaleDateString('ar-EG', {day:'numeric', month:'long', year:'numeric'}) + " م";
    document.getElementById("hijri").innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', {day:'numeric', month:'long', year:'numeric'}).format(now);

    let currentS = h * 3600 + m * 60 + s;
    let nextIdx = -1;
    let isIqama = false;
    let remainingS = 0;

    for(let i=0; i<prayerData.length; i++){
        let pS = prayerData[i].h * 3600 + prayerData[i].m * 60;
        let iqamaS = pS + (prayerData[i].iqama * 60);
        if(currentS >= pS && currentS < iqamaS && prayerData[i].iqama > 0){
            isIqama = true;
            remainingS = iqamaS - currentS;
            nextIdx = i;
            break;
        }
    }

    if(!isIqama){
        let found = false;
        for(let i=0; i<prayerData.length; i++){
            let pS = prayerData[i].h * 3600 + prayerData[i].m * 60;
            if(pS > currentS){
                remainingS = pS - currentS;
                nextIdx = i;
                found = true;
                break;
            }
        }
        if(!found){ 
            let fS = prayerData[0].h * 3600 + prayerData[0].m * 60;
            remainingS = (86400 - currentS) + fS;
            nextIdx = 0;
        }
    }

    const tLabel = document.getElementById("timer-label");
    const tDisp = document.getElementById("timer");
    const tBox = document.getElementById("timerBox");

    if(isIqama){
        tBox.classList.add("iqama-mode");
        tLabel.innerText = "متبقي على الإقامة";
    } else {
        tBox.classList.remove("iqama-mode");
        tLabel.innerText = "الصلاة القادمة بعد";
    }

    let hh = Math.floor(remainingS/3600), mm = Math.floor((remainingS%3600)/60), ss = remainingS%60;
    tDisp.innerText = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;

    document.querySelectorAll(".prayer-item").forEach(el => el.classList.remove("next-prayer"));
    if(nextIdx !== -1) {
        const target = document.getElementById("prayer-"+nextIdx);
        if(target) target.classList.add("next-prayer");
    }
}

init(); update(); setInterval(update, 1000);
let z=0; 
setInterval(()=>{ 
    const el=document.getElementById("zikr"); 
    el.style.opacity=0; 
    setTimeout(()=>{ 
        z=(z+1)%azkar.length; 
        el.innerText=azkar[z]; 
        el.style.opacity=1; 
    },1000); 
},30000);
</script>
</body>
</html>
