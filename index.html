<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مواقيت الصلاة - جامع الأمير فواز</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;800;900&display=swap" rel="stylesheet">

<style>

:root{
--gold-3d: linear-gradient(to bottom,#f1d592 0%,#d4af37 40%,#b2945e 100%);
--real-gold:#d4af37;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
background:url('https://images.unsplash.com/photo-1591604129939-f1efa4d9f7fa?q=80&w=2000') center/cover no-repeat fixed;
color:#fff;
font-family:'Tajawal',sans-serif;
height:100vh;
overflow:hidden;
}

.wrapper{
position:relative;
z-index:2;
height:100%;
display:flex;
flex-direction:column;
}

.top-bar{
background:rgba(0,0,0,0.5);
display:flex;
justify-content:space-between;
padding:10px 35px;
border-bottom:2px solid var(--real-gold);
font-size:1.4rem;
font-weight:bold;
color:var(--real-gold);
text-shadow:2px 2px 4px #000;
/* إنزال الشريط العلوي قليلاً */
margin-top:15px;
}

.main-content{
display:grid;
grid-template-columns:300px 1fr;
gap:20px;
padding:20px;
flex:1;
align-items:center;
}

.left-panel{
background:rgba(0,0,0,0.3);
border:1px solid rgba(212,175,55,0.5);
border-radius:25px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100%;
backdrop-filter:blur(5px);
}

#digi-time{
font-size:5rem;
font-weight:900;
color:var(--real-gold);
line-height:1;
text-shadow:5px 5px 15px rgba(0,0,0,1);
}

#ampm{
font-size:1.7rem;
color:var(--real-gold);
margin-bottom:12px;
text-shadow:2px 2px 8px #000;
}

.center-panel{
display:flex;
align-items:center;
justify-content:center;
padding:20px;
text-align:center;
}

#zikr-text{
font-size:2.2rem;
font-weight:900;
line-height:1.4;
color:var(--real-gold);
text-shadow:
4px 4px 10px rgba(0,0,0,1),
-4px -4px 10px rgba(0,0,0,1),
0 0 25px rgba(0,0,0,0.8);
}

.bottom-grid{
display:grid;
grid-template-columns:repeat(6,1fr);
/* زيادة ارتفاع مواقيت الصلاة */
height:160px;
background:rgba(0,0,0,0.6);
border-top:3px solid var(--real-gold);
backdrop-filter:blur(10px);
}

.p-box{
border-left:1px solid rgba(212,175,55,0.2);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.p-box.active{
background:rgba(212,175,55,0.2);
border-top:8px solid var(--real-gold);
}

.p-box .name{
font-size:1.1rem;
color:#fff;
margin-bottom:4px;
font-weight:bold;
text-shadow:2px 2px 4px #000;
}

.p-box .time{
font-size:2rem;
font-weight:900;
background:var(--gold-3d);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
filter:drop-shadow(4px 4px 5px rgba(0,0,0,1));
}

#countdown{
margin-top:8px;
font-size:1.6rem;
color:#fff;
font-weight:bold;
text-shadow:2px 2px 5px #000;
}

</style>
</head>

<body>

<div class="wrapper">

<div class="top-bar">
<div id="en-date">--</div>
<div style="font-size:1.7rem;text-shadow:3px 3px 6px #000;">جامع الأمير فواز - جدة</div>
<div id="ar-date">--</div>
</div>

<div class="main-content">

<div class="left-panel">

<div id="digi-time">00:00</div>
<div id="ampm">--</div>

<div style="color:#fff;font-size:1.1rem;border-top:1px solid rgba(212,175,55,0.5);padding-top:12px;width:80%;text-align:center;text-shadow:2px 2px 4px #000;">

الصلاة القادمة:
<br>

<span id="next-prayer-name"
style="color:var(--real-gold);font-weight:bold;font-size:1.7rem;text-shadow:3px 3px 6px #000;">
--
</span>

<div id="countdown">00:00:00</div>

</div>

</div>

<div class="center-panel">
<div id="zikr-text"></div>
</div>

</div>

<div class="bottom-grid" id="prayer-list"></div>

</div>

<script>

const prayerSchedule=[
{n:'الفجر',t:'5:21 ص'},
{n:'الشروق',t:'6:38 ص'},
{n:'الظهر',t:'12:31 م'},
{n:'العصر',t:'3:52 م'},
{n:'المغرب',t:'6:24 م'},
{n:'العشاء',t:'7:54 م'}
];

function convertToDate(time){

let parts=time.split(' ');
let hm=parts[0].split(':');

let h=parseInt(hm[0]);
let m=parseInt(hm[1]);

if(parts[1]=='م' && h!=12)h+=12;
if(parts[1]=='ص' && h==12)h=0;

let d=new Date();
d.setHours(h,m,0,0);

return d;

}

function updateDashboard(){

const now=new Date();

let h=now.getHours();
let m=now.getMinutes();

document.getElementById('digi-time').innerText=`${h%12||12}:${String(m).padStart(2,'0')}`;
document.getElementById('ampm').innerText=h>=12?'مساءً':'صباحاً';

document.getElementById('en-date').innerText=
now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

document.getElementById('ar-date').innerText=
new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura',
{day:'numeric',month:'long',year:'numeric',weekday:'long'}).format(now);

let nextIndex=0;
let targetTime;

for(let i=0;i<prayerSchedule.length;i++){

let t=convertToDate(prayerSchedule[i].t);

if(now<t){
nextIndex=i;
targetTime=t;
break;
}

if(i==prayerSchedule.length-1){
nextIndex=0;
targetTime=convertToDate(prayerSchedule[0].t);
targetTime.setDate(targetTime.getDate()+1);
}

}

document.getElementById('next-prayer-name').innerText=prayerSchedule[nextIndex].n;

let diff=(targetTime-now)/1000;

let hours=Math.floor(diff/3600);
let minutes=Math.floor((diff%3600)/60);
let seconds=Math.floor(diff%60);

document.getElementById('countdown').innerText=
`${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;

const grid=document.getElementById('prayer-list');

grid.innerHTML=prayerSchedule.map((p,index)=>`

<div class="p-box ${index===nextIndex?'active':''}">
<div class="name">${p.n}</div>
<div class="time">${p.t}</div>
</div>

`).join('');

}

// 50 ذكر للشاشة
const azkar=[
"«سبحان الله وبحمده، سبحان الله العظيم»",
"«سبحان الله والحمد لله ولا إله إلا الله والله أكبر»",
"«لا إله إلا الله وحده لا شريك له، له الملك وله الحمد وهو على كل شيء قدير»",
"«أستغفر الله العظيم وأتوب إليه»",
"«اللهم صلِّ وسلم على نبينا محمد»",
"«اللهم أعنا على ذكرك وشكرك وحسن عبادتك»",
"«اللهم اغفر لي ولوالديَّ وارحمهما كما ربياني صغيرًا»",
"«اللهم اغفر للمؤمنين والمؤمنات الأحياء منهم والأموات»",
"«اللهم إنا نسألك الهدى والتقى والعفاف والغنى»",
"«اللهم اغفر لنا وارحمنا واهدنا وعافنا وارزقنا»",
"«رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً وَفِي الآخِرَةِ حَسَنَةً وَقِنَا عَذَابَ النَّارِ»",
"«رَبِّ زِدْنِي عِلْمًا»",
"«رَبِّ اشْرَحْ لِي صَدْرِي»",
"«اللهم إني أسألك الجنة وأعوذ بك من النار»",
"«اللهم تقبل منا إنك أنت السميع العليم»",
"«اللهم إنك عفو كريم تحب العفو فاعف عنا»",
"«اللهم اجعل القرآن ربيع قلوبنا»",
"«اللهم ثبت قلوبنا على دينك»",
"«اللهم ارزقنا الإخلاص في القول والعمل»",
"«اللهم اجعلنا من الذاكرين الشاكرين»",
"«اللهم أصلح لنا ديننا الذي هو عصمة أمرنا»",
"«اللهم بارك لنا في أوقاتنا وأعمالنا»",
"«اللهم اغفر لنا ولوالدينا ولجميع المسلمين»",
"«اللهم ارزقنا حسن الخاتمة»",
"«اللهم صلِّ وسلم وبارك على نبينا محمد»",
"«اللهم اهدنا واهد بنا واجعلنا سببًا لمن اهتدى»",
"«اللهم اجعلنا من أهل القرآن»",
"«اللهم احفظ بلاد المسلمين»",
"«اللهم اجعل هذا البلد آمنًا مطمئنًا»",
"«اللهم اكفنا بحلالك عن حرامك»",
"«اللهم اغننا بفضلك عمن سواك»",
"«اللهم فرّج همّ المهمومين»",
"«اللهم نفّس كرب المكروبين»",
"«اللهم اقضِ الدين عن المدينين»",
"«اللهم اشفِ مرضانا ومرضى المسلمين»",
"«اللهم ارحم موتانا وموتى المسلمين»",
"«اللهم ارزقنا حبك وحب من يحبك»",
"«اللهم اجعلنا من التوابين»",
"«اللهم اجعلنا من المتطهرين»",
"«اللهم تقبل صلاتنا وصيامنا»",
"«يَا أَيُّهَا الَّذِينَ آمَنُوا اذْكُرُوا اللَّهَ ذِكْرًا كَثِيرًا»",
"«فَاذْكُرُونِي أَذْكُرْكُمْ»",
"«وَاسْتَغْفِرُوا اللَّهَ إِنَّ اللَّهَ غَفُورٌ رَّحِيمٌ»",
"«وَاللَّهُ خَيْرُ الرَّازِقِينَ»",
"«اللهم ثبتنا على الحق»",
"«اللهم اجعلنا من عبادك الصالحين»",
"«اللهم اجعلنا من الذين يستمعون القول فيتبعون أحسنه»",
"«اللهم اجعلنا من أهل الجنة»",
"«اللهم اجعلنا من الذين لا خوف عليهم ولا هم يحزنون»"
];

let zIdx=0;

function cycleZikr(){
document.getElementById('zikr-text').innerText=azkar[zIdx];
zIdx=(zIdx+1)%azkar.length;
}

cycleZikr();

setInterval(cycleZikr,20000);
setInterval(updateDashboard,1000);

updateDashboard();

</script>

</body>
</html>
