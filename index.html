<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>مواقيت الصلاة</title>

<style>

body{
margin:0;
font-family:tahoma;
background:#0b0b0b;
color:white;
overflow:hidden;
}

/* الشريط العلوي */

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#111;
border-bottom:3px solid gold;
font-size:26px;
}

#clock{
font-size:40px;
font-weight:bold;
}

/* جدول الصلوات */

.prayer-section{
display:flex;
justify-content:center;
padding:20px;
}

table{
width:90%;
border-collapse:collapse;
text-align:center;
font-size:28px;
}

th{
background:#1b1b1b;
padding:15px;
border-bottom:2px solid gold;
}

td{
padding:15px;
border-bottom:1px solid #333;
}

.next-prayer{
background:rgba(212,175,55,0.25);
box-shadow:0 0 25px rgba(212,175,55,.7);
}

/* العداد */

.countdown{
text-align:center;
font-size:42px;
color:gold;
margin-top:10px;
}

/* الأحاديث */

.hadith{
position:absolute;
bottom:0;
width:100%;
background:#111;
padding:25px;
font-size:26px;
text-align:center;
border-top:3px solid gold;
}

</style>

</head>

<body>

<div class="top-bar">

<div id="date"></div>

<div id="clock"></div>

</div>

<div class="prayer-section">

<table>

<thead>

<tr>

<th>الصلاة</th>

<th>الأذان</th>

<th>الإقامة</th>

</tr>

</thead>

<tbody id="rows"></tbody>

</table>

</div>

<div class="countdown" id="counter"></div>

<div class="hadith" id="hadith"></div>

<script>

/* مواقيت الأذان والإقامة */

const prayers=[

{name:"الفجر",azan:{h:5,m:10},iqama:{h:5,m:35}},

{name:"الشروق",azan:{h:6,m:34},iqama:null},

{name:"الظهر",azan:{h:12,m:20},iqama:{h:12,m:35}},

{name:"العصر",azan:{h:15,m:34},iqama:{h:15,m:49}},

{name:"المغرب",azan:{h:18,m:6},iqama:{h:18,m:16}},

{name:"العشاء",azan:{h:19,m:31},iqama:{h:19,m:51}}

];

/* إنشاء جدول الصلوات */

function createTable(){

let html="";

prayers.forEach((p,i)=>{

let az=

String(p.azan.h).padStart(2,"0")+":"+

String(p.azan.m).padStart(2,"0");

let iq="--";

if(p.iqama){

iq=

String(p.iqama.h).padStart(2,"0")+":"+

String(p.iqama.m).padStart(2,"0");

}

html+=`

<tr id="p${i}">

<td>${p.name}</td>

<td>${az}</td>

<td>${iq}</td>

</tr>

`;

});

document.getElementById("rows").innerHTML=html;

}

createTable();

/* الساعة */

function updateClock(){

let now=new Date();

let h=now.getHours();

let m=now.getMinutes();

let s=now.getSeconds();

document.getElementById("clock").innerText=

String(h).padStart(2,"0")+":"+

String(m).padStart(2,"0")+":"+

String(s).padStart(2,"0");

}

setInterval(updateClock,1000);

/* التاريخ ميلادي وهجري */

function updateDate(){

let now=new Date();

let g=now.toLocaleDateString("ar-SA");

let h=new Intl.DateTimeFormat('ar-TN-u-ca-islamic',{

day:'numeric',

month:'long',

year:'numeric'

}).format(now);

document.getElementById("date").innerText=

"الميلادي: "+g+" | الهجري: "+h;

}

updateDate();

/* تحديث العداد */

function update(){

let now=new Date();

let current=

now.getHours()*3600+

now.getMinutes()*60+

now.getSeconds();

let nextIndex=-1;

let nextType="azan";

let nextTime=0;

for(let i=0;i<prayers.length;i++){

let az=

prayers[i].azan.h*3600+

prayers[i].azan.m*60;

let iq=null;

if(prayers[i].iqama){

iq=

prayers[i].iqama.h*3600+

prayers[i].iqama.m*60;

}

/* بعد الأذان وقبل الإقامة */

if(iq && current>=az && current<iq){

nextIndex=i;

nextType="iqama";

nextTime=iq;

break;

}

/* قبل الأذان */

if(current<az){

nextIndex=i;

nextType="azan";

nextTime=az;

break;

}

}

/* بعد آخر صلاة */

if(nextIndex==-1){

nextIndex=0;

nextType="azan";

nextTime=

prayers[0].azan.h*3600+

prayers[0].azan.m*60+

86400;

}

/* إضاءة الصلاة القادمة */

document.querySelectorAll("tr").forEach(el=>{

el.classList.remove("next-prayer");

});

let row=document.getElementById("p"+nextIndex);

if(row) row.classList.add("next-prayer");

/* العداد */

let diff=nextTime-current;

let h=Math.floor(diff/3600);

let m=Math.floor((diff%3600)/60);

let s=diff%60;

let label="متبقي على الأذان";

if(nextType=="iqama") label="متبقي على الإقامة";

document.getElementById("counter").innerText=

label+" : "+

String(h).padStart(2,"0")+":"+

String(m).padStart(2,"0")+":"+

String(s).padStart(2,"0");

}

setInterval(update,1000);

/* الأحاديث */

const hadiths=[

"إنما الأعمال بالنيات",

"الدين النصيحة",

"المسلم من سلم المسلمون من لسانه ويده",

"لا يؤمن أحدكم حتى يحب لأخيه ما يحب لنفسه",

"من كان يؤمن بالله واليوم الآخر فليقل خيراً أو ليصمت",

"الطهور شطر الإيمان",

"الكلمة الطيبة صدقة",

"تبسمك في وجه أخيك صدقة",

"أحب الأعمال إلى الله الصلاة على وقتها",

"بروا آباءكم تبركم أبناؤكم",

"من سلك طريقاً يلتمس فيه علماً سهل الله له طريقاً إلى الجنة",

"خيركم من تعلم القرآن وعلمه",

"اليد العليا خير من اليد السفلى",

"لا تغضب",

"اتق الله حيثما كنت",

"أقرب ما يكون العبد من ربه وهو ساجد",

"إن الله جميل يحب الجمال",

"من لا يشكر الناس لا يشكر الله",

"الرفق لا يكون في شيء إلا زانه",

"أحب الناس إلى الله أنفعهم للناس",

"خيركم خيركم لأهله",

"صل من قطعك",

"لا تحقرن من المعروف شيئاً",

"إن الله لا ينظر إلى صوركم ولكن إلى قلوبكم",

"أفضل الصدقة سقي الماء",

"من دل على خير فله مثل أجر فاعله",

"إن الله كتب الإحسان على كل شيء",

"من غشنا فليس منا",

"يسروا ولا تعسروا",

"بشروا ولا تنفروا"

];

let hadithIndex=0;

function changeHadith(){

document.getElementById("hadith").innerText=

hadiths[hadithIndex];

hadithIndex++;

if(hadithIndex>=hadiths.length){

hadithIndex=0;

}

}

changeHadith();

setInterval(changeHadith,15000);

</script>

</body>

</html>
