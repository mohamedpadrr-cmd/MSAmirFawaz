<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مواقيت المسجد - جدة 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/adhan@4.4.1/dist/Adhan.min.js"></script>
    <style>
        :root { --gold: #b2945e; --dark-bg: rgba(0, 0, 0, 0.85); --card-bg: rgba(253, 246, 227, 0.95); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000 url('https://mohamedpadrr-cmd.github.io/MSAmirFawaz/static/media/bg.c5485458156157e1df23.jpg') center/cover no-repeat; /* تم ربط الخلفية الأصلية هنا */
            color: white; font-family: 'Tajawal', sans-serif; height: 100vh; overflow: hidden;
        }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); z-index: 1; }
        .wrapper { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }

        /* الشريط العلوي */
        .top-bar { background: rgba(26, 21, 10, 0.9); display: flex; justify-content: space-between; padding: 10px 40px; border-bottom: 2px solid var(--gold); font-size: 1.8rem; color: var(--gold); }

        /* المحتوى الرئيسي */
        .main-layout { display: grid; grid-template-columns: 1fr 3fr; gap: 20px; padding: 20px; height: 70vh; flex: 1; }

        /* الجانب الأيمن (الساعة) */
        .clock-container { border: 2px solid var(--gold); border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--dark-bg); box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .analog-clock { width: 220px; height: 220px; border: 8px solid #fff; border-radius: 50%; position: relative; margin-bottom: 20px; }
        #digital-time { font-size: 7rem; font-weight: 800; color: #00ff00; line-height: 1; }
        #am-pm { font-size: 2.5rem; color: #00ff00; }

        /* الجانب الأيسر (اللوحة الكبيرة) */
        .content-panel { background: var(--card-bg); border-radius: 25px; border: 5px solid var(--gold); position: relative; color: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; box-shadow: 0 0 30px rgba(0,0,0,0.6); }
        .quote-header { position: absolute; top: 0; right: 40px; background: #222; color: var(--gold); padding: 5px 30px; border-radius: 0 0 15px 15px; font-size: 1.5rem; }
        .quote-text { font-size: 3rem; font-weight: 800; line-height: 1.6; color: #1a1a1a; margin-bottom: 20px; }
        .quote-ref { font-size: 1.2rem; color: #666; }

        /* شريط المواقيت السفلي */
        .prayer-footer { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0; height: 18vh; border-top: 2px solid var(--gold); background: rgba(0,0,0,0.9); }
        .prayer-box { border-left: 1px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; }
        .prayer-box.active { background: #1a3a1a; border-top: 5px solid #00ff00; }
