<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جامع الأمير فواز - الشاشة الرئيسية</title>
    <style>
        :root { --gold: #dfbd69; --bg: #000; --box: #1a1a1a; --border: #333; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden; padding: 20px;
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com');
            background-size: cover; background-position: center;
        }

        /* الجزء العلوي: الاسم (يسار) والساعة (يمين) حسب الصورة */
        .top-section { display: flex; justify-content: space-between; align-items: flex-start; height: 35%; }
        .mosque-name { font-size: 5rem; color: var(--gold); font-weight: bold; margin-top: 20px; }
        .clock-area { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .analog-clock { width: 150px; height: 150px; border: 4px solid var(--gold); border-radius: 50%; position: relative; background: rgba(0,0,0,0.5); }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; border-radius: 5px; }
        .hour { width: 5px; height: 40px; background: white; }
        .min { width: 3px; height: 60px; background: #ddd; }
        .sec { width: 1.5px; height: 65px; background: var(--gold); }
        .digital-clock { font-size: 5rem; color: var(--gold); background: var(--box); padding: 10px 40px; border-radius: 15px; border: 1px solid var(--border); font-weight: bold; }

        /* المنتصف: الذكر (يسار) والتواريخ (يمين) */
        .middle-section { display: flex; justify-content: space-between; align-items: center; flex: 1; }
        .dhikr-box { border-right: 10px solid var(--gold); padding-right: 30px; font-size: 6rem; font-weight: bold; }
        .dates-box { display: flex; flex-direction: column; gap: 10px; }
        .date-row { background: var(--box); font-size: 2rem; padding: 15px 30px; border-radius: 10px; border: 1px solid var(--border); width: 350px; text-align: center; }

        /* الأسفل: شريط مواقيت الصلاة (الذي كان مفقوداً) */
        .prayer-bar { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; padding: 15px 0; border-top: 1px solid var(--border); }
        .prayer-item { border: 2px solid var(--border); border-radius: 12px; text-align: center; padding: 10px; background: rgba(20,20,20,0.8); position: relative; }
        .prayer-item.active { border-color: var(--gold); background: rgba(223, 189, 105, 0.2); transform: scale(1.05); }
        .active-label { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; padding: 2px 10px; border-radius: 5px; font-size: 0.9rem; font-weight: bold; display: none; }
        .active .active-label { display: block; }
        .p-name { font-size: 1.8rem; color: #aaa; margin-bottom: 5px; }
        .active .p-name { color: white; font-weight: bold; }
        .p-time { font-size: 2.2rem; font-weight: bold; }

        /* شريط الإقامة */
        .iqama-footer { display: flex; justify-content: flex-end; padding-top: 10px; }
        .iqama-box { background: var(--gold); color: black; font-size: 2.5rem; font-weight: bold; padding: 10px 60px; border-radius: 12px; width: 400px; text-align: center; }
    </style>
</head>
<body>

    <div class="top-section">
        <div class="mosque-name">جَامِع الأَمير فَواز</div>
        <div class="clock-area">
            <div class="analog-clock">
                <div class="hand hour" id="h-hand"></div>
                <div class="hand min" id="m-hand"></div>
                <div class="hand sec" id="s-hand"></div>
            </div>
            <div class="digital-clock" id="digi-clock">00:00 ص</div>
        </div>
    </div>

    <div class="middle-section">
        <div class="dhikr-box" id="dhikr">أستغفر الله العظيم</div>
        <div class="dates-box">
            <div class="date-row" id="g-date">-- سبتمبر 2024 م</div>
            <div class="date-row" id="h-date">-- ربيع الأول 1446 هـ</div>
        </div>
    </div>

    <div class="prayer-bar" id="prayer-bar">
        <!-- يتم تعبئتها تلقائياً -->
    </div>

    <div class="iqama-footer">
        <div class="iqama-box" id="iqama-text">الإقامة بعد: 10:00 د</div>
    </div>

    <script>
        const dhikrs = ["أستغفر الله العظيم", "لا إله إلا الله", "سبحان الله وبحمده", "صلّ على محمد", "الحمد لله"];
        let dIdx = 0;
        setInterval(() => { dIdx = (dIdx + 1) % dhikrs.length; document.getElementById('dhikr').innerText = dhikrs[dIdx]; }, 30000);

        async function fetchPrayers() {
            try {
                const res = await fetch('https://api.aladhan.com');
                const data = await res.json();
                const t = data.data.timings;
                renderPrayers([
                    {n: "الفجر", t: t.Fajr}, {n: "الشروق", t: t.Sunrise}, {n: "الظهر", t: t.Dhuhr},
                    {n: "العصر", t: t.Asr}, {n: "المغرب", t: t.Maghrib}, {n: "العشاء", t: t.Isha}
                ]);
            } catch(e) { console.log("API Error"); }
        }

        function format12(t24) {
            let [h, m] = t24.split(':');
            h = parseInt(h);
            const s = h >= 12 ? 'م' : 'ص';
            return `${h % 12 || 12}:${m} ${s}`;
        }

        function renderPrayers(list) {
            const container = document.getElementById('prayer-bar');
            container.innerHTML = '';
            const now = new Date();
            const currMin = now.getHours() * 60 + now.getMinutes();
            let nextIdx = 0;

            for(let i=0; i<list.length; i++){
                const [h, m] = list[i].t.split(':').map(Number);
                if(currMin < (h * 60 + m)) { nextIdx = i; break; }
            }

            list.forEach((p, i) => {
                const active = i === nextIdx ? 'active' : '';
                container.innerHTML += `<div class="prayer-item ${active}"><div class="active-label">الصلاة القادمة</div><div class="p-name">${p.n}</div><div class="p-time">${format12(p.t)}</div></div>`;
            });
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('digi-clock').innerText = now.toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit', hour12:true});
            document.getElementById('s-hand').style.transform = `rotate(${now.getSeconds()*6}deg)`;
            document.getElementById('m-hand').style.transform = `rotate(${now.getMinutes()*6}deg)`;
            document.getElementById('h-hand').style.transform = `rotate(${(now.getHours()%12)*30 + now.getMinutes()/2}deg)`;
            
            const opt = { day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('g-date').innerText = now.toLocaleDateString('ar-SA', opt) + " م";
            document.getElementById('h-date').innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-uma', opt).format(now) + " هـ";
        }

        setInterval(updateTime, 1000);
        fetchPrayers();
        setInterval(fetchPrayers, 3600000);
    </script>
</body>
</html>
