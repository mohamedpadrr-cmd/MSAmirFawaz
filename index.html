<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مواقيت الصلاة - جامع الأمير فواز</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold-3d: linear-gradient(to bottom, #f1d592 0%, #d4af37 40%, #b2945e 100%);
            --real-gold: #d4af37;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: url('https://images.unsplash.com/photo-1591604129939-f1efa4d9f7fa?q=80&w=2000') center/cover no-repeat fixed;
            color: #fff; font-family: 'Tajawal', sans-serif; height: 100vh; overflow: hidden;
        }

        .wrapper { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; }

        .top-bar { 
            background: rgba(0, 0, 0, 0.6); display: flex; justify-content: space-between; 
            padding: 10px 50px; border-bottom: 2px solid var(--real-gold); font-size: 1.8rem; font-weight: bold;
            color: var(--real-gold); text-shadow: 2px 2px 4px #000;
        }

        .main-content { 
            display: grid; grid-template-columns: 400px 1fr; gap: 20px; 
            padding: 20px; flex: 1; align-items: center;
        }

        .left-panel { 
            background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(212, 175, 55, 0.4); 
            border-radius: 20px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 80%; backdrop-filter: blur(8px);
        }

        #digi-time { font-size: 8rem; font-weight: 900; color: var(--real-gold); line-height: 1; text-shadow: 4px 4px 10px #000; }
        #ampm { font-size: 2.5rem; color: var(--real-gold); margin-bottom: 15px; }

        /* الأذكار بحجم أصغر وعائمة */
        .center-panel { background: none; border: none; text-align: center; padding: 10px; }
        #zikr-text { 
            font-size: 3rem; /* تصغير الحجم */
            font-weight: 800; 
            color: #fff; 
            text-shadow: 2px 2px 10px #000, 0 0 20px rgba(212, 175, 55, 0.3);
            line-height: 1.4;
        }

        /* شريط المواقيت السفلي المكبر */
        .bottom-grid { 
            display: grid; grid-template-columns: repeat(6, 1fr); 
            height: 280px; /* تكبير الشريط السفلي */
            background: rgba(0, 0, 0, 0.85); 
            border-top: 5px solid var(--real-gold);
            box-shadow: 0 -15px 50px rgba(0,0,0,1);
        }

        .p-box { 
            border-left: 1px solid rgba(212, 175, 55, 0.2); 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            padding: 10px;
        }
        
        .p-box.active { 
            background: linear-gradient(to bottom, rgba(212, 175, 55, 0.2), transparent);
            border-top: 12px solid var(--real-gold);
        }

        /* أسماء الصلوات وتوقيتها بتأثير 3D ملكي */
        .p-box .name { 
            font-size: 2.4rem; /* تكبير الخط */
            font-weight: 900; 
            margin-bottom: 15px;
            background: var(--gold-3d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(2px 3px 2px rgba(0,0,0,1));
        }

        .p-box .time { 
            font-size: 4.2rem; /* تكبير التوقيت */
            font-weight: 900; 
            background: var(--gold-3d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(4px 5px 4px rgba(0,0,0,1));
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="top-bar">
            <div id="en-date">--</div>
            <div style="font-size: 2.2rem;">جامع الأمير فواز - جدة</div>
            <div id="ar-date">--</div>
        </div>

        <div class="main-content">
            <div class="left-panel">
                <div id="digi-time">00:00</div>
                <div id="ampm">--</div>
                <div style="color:#fff; font-size:1.4rem; border-top:1px solid rgba(212, 175, 55, 0.4); padding-top:15px; width:80%; text-align:center;">
                    الصلاة القادمة: <br>
                    <span id="next-prayer-name" style="color:var(--real-gold); font-weight:bold; font-size:2.5rem; text-shadow: 2px 2px 5px #000;">--</span>
                </div>
            </div>

            <div class="center-panel">
                <div id="zikr-text">«سبحان الله وبحمده، سبحان الله العظيم»</div>
            </div>
        </div>

        <div class="bottom-grid" id="prayer-list"></div>
    </div>

<script>
    const prayerSchedule = [
        { n: 'الفجر', t: '5:21 ص' },
        { n: 'الشروق', t: '6:38 ص' },
        { n: 'الظهر', t: '12:31 م' },
        { n: 'العصر', t: '3:52 م' },
        { n: 'المغرب', t: '6:24 م' },
        { n: 'العشاء', t: '7:54 م' }
    ];

    function updateDashboard() {
        const now = new Date();
        let h = now.getHours();
        const m = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('digi-time').innerText = `${h % 12 || 12}:${m}`;
        document.getElementById('ampm').innerText = h >= 12 ? 'مساءً' : 'صباحاً';

        document.getElementById('en-date').innerText = now.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'});
        document.getElementById('ar-date').innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura', {day:'numeric', month:'long', year:'numeric', weekday:'long'}).format(now);

        const currentMinutes = h * 60 + now.getMinutes();
        let nextIndex = 0;
        if (currentMinutes > (19 * 60 + 54)) nextIndex = 0;
        else if (currentMinutes > (18 * 60 + 24)) nextIndex = 5;
        else if (currentMinutes > (15 * 60 + 52)) nextIndex = 4;
        else if (currentMinutes > (12 * 60 + 31)) nextIndex = 3;
        else if (currentMinutes > (6 * 60 + 38)) nextIndex = 2;
        else if (currentMinutes > (5 * 60 + 21)) nextIndex = 1;
        else nextIndex = 0;

        document.getElementById('next-prayer-name').innerText = prayerSchedule[nextIndex].n;

        const grid = document.getElementById('prayer-list');
        grid.innerHTML = prayerSchedule.map((p, index) => `
            <div class="p-box ${index === nextIndex ? 'active' : ''}">
                <div class="name">${p.n}</div>
                <div class="time">${p.t}</div>
            </div>
        `).join('');
    }

    const azkar = [
        "«سبحان الله وبحمده، سبحان الله العظيم»",
        "«لا إله إلا الله وحده لا شريك له، له الملك وله الحمد»",
        "«اللهم صلِ وسلم على نبينا محمد»",
        "«أستغفر الله العظيم وأتوب إليه»",
        "«لا حول ولا قوة إلا بالله العلي العظيم»"
    ];
    let zIdx = 0;
    function cycleZikr() {
        document.getElementById('zikr-text').innerText = azkar[zIdx];
        zIdx = (zIdx + 1) % azkar.length;
    }
    cycleZikr();
    setInterval(cycleZikr, 20000);
    setInterval(updateDashboard, 1000);
    updateDashboard();
</script>
</body>
</html>
