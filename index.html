<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جامع الأمير فواز - جدة</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/adhan@4.4.1/dist/Adhan.min.js"></script>
    <style>
        :root { --gold: #d4af37; --bg-card: rgba(0, 0, 0, 0.75); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #000 url('https://images.unsplash.com/photo-1591604129939-f1efa4d9f7fa?q=80&w=2000') center/cover;
            color: #fff; font-family: 'Tajawal', sans-serif; height: 100vh; overflow: hidden;
        }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); z-index: 1; }
        .main-content { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 3% 5%; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; }
        .mosque-name { font-family: 'Amiri', serif; color: var(--gold); font-size: 4rem; }
        .zikr-box { background: var(--bg-card); border: 2px solid var(--gold); border-radius: 20px; padding: 30px; width: 400px; text-align: center; font-size: 2.5rem; font-weight: 900; }

        /* Clock & Dates */
        .middle { display: flex; justify-content: flex-end; align-items: center; gap: 40px; }
        .clock-box { text-align: right; }
        #time { font-size: 10rem; color: var(--gold); font-weight: 900; line-height: 1; }
        .date-row { background: rgba(255,255,255,0.1); padding: 5px 20px; border-radius: 50px; margin-top: 10px; font-size: 1.5rem; display: inline-block; border: 1px solid rgba(255,255,255,0.2); }

        /* Prayer Bar */
        .footer { display: flex; gap: 15px; align-items: flex-end; }
        .iqama-card { background: linear-gradient(90deg, #aa8a2e, #d4af37); color: #000; padding: 20px; border-radius: 20px; width: 25%; display: flex; justify-content: space-between; align-items: center; }
        .prayer-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; flex: 1; }
        .p-card { background: var(--bg-card); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 15px; text-align: center; transition: 0.3s; }
        .p-card.active { border: 2px solid var(--gold); background: rgba(212, 175, 55, 0.2); transform: scale(1.05); box-shadow: 0 0 20px var(--gold); }
        .p-name { font-size: 1.2rem; opacity: 0.7; }
        .p-time { font-size: 2rem; font-weight: 900; margin: 5px 0; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="main-content">
        <div class="header">
            <div class="zikr-box" id="zikr">أستغفر الله العظيم</div>
            <h1 class="mosque-name">مَسجِد الأَمير فَواز</h1>
        </div>

        <div class="middle">
            <div class="clock-box">
                <div id="time">00:00</div>
                <div id="day-date" class="date-row"></div> <br>
                <div id="hijri-date" class="date-row" style="color:var(--gold)"></div>
            </div>
            <canvas id="analogClock" width="250" height="250" style="border: 8px solid var(--gold); border-radius: 50%; background: rgba(0,0,0,0.5);"></canvas>
        </div>

        <div class="footer">
            <div class="iqama-card">
                <span id="iqama-timer" style="font-size: 3rem; font-weight: 900;">10:00 د</span>
                <span style="font-size: 1.5rem; font-weight: bold;">الإقامة بعد:</span>
            </div>
            <div class="prayer-grid" id="prayers"></div>
        </div>
    </div>

<script>
    // تحديث الوقت والتواريخ تلقائياً
    function updateDateTime() {
        const now = new Date();
        document.getElementById('time').innerText = now.toLocaleTimeString('ar-SA', {hour: '2-digit', minute: '2-digit', hour12: false});
        
        const dayOptions = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
        document.getElementById('day-date').innerText = now.toLocaleDateString('ar-SA', dayOptions);
        
        const hijriOptions = { day: 'numeric', month: 'long', year: 'numeric', calendar: 'islamic-umalqura' };
        document.getElementById('hijri-date').innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura', hijriOptions).format(now) + ' هـ';
    }

    // حساب مواقيت الصلاة (جدة)
    function updatePrayers() {
        const coords = new adhan.Coordinates(21.4858, 39.1925);
        const params = adhan.CalculationMethod.UmmAlQura();
        const prayerTimes = new adhan.PrayerTimes(coords, new Date(), params);

        const list = [
            { name: 'الفجر', time: prayerTimes.fajr },
            { name: 'الشروق', time: prayerTimes.sunrise },
            { name: 'الظهر', time: prayerTimes.dhuhr },
            { name: 'العصر', time: prayerTimes.asr },
            { name: 'المغرب', time: prayerTimes.maghrib },
            { name: 'العشاء', time: prayerTimes.isha }
        ];

        const next = prayerTimes.nextPrayer();
        const prayersDiv = document.getElementById('prayers');
        prayersDiv.innerHTML = list.map(p => `
            <div class="p-card ${adhan.Prayer[next] === p.name ? 'active' : ''}">
                <div class="p-name">${p.name}</div>
                <div class="p-time">${p.time.toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit'})}</div>
            </div>
        `).join('');
    }

    // تدوير الأذكار كل 30 ثانية
    const azkar = ["أستغفر الله العظيم", "سبحان الله وبحمده", "لا إله إلا الله", "اللهم صلِ على محمد"];
    let aIndex = 0;
    setInterval(() => {
        aIndex = (aIndex + 1) % azkar.length;
        document.getElementById('zikr').innerText = azkar[aIndex];
    }, 30000);

    setInterval(updateDateTime, 1000);
    updateDateTime();
    updatePrayers();
</script>
</body>
</html>
