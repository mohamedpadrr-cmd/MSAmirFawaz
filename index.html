<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة جامع الأمير فواز - النسخة الشاملة</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { 
            --gold-3d: #FFD700; 
            --gold-dark: #8B7500;
            --white: #F5F5F5; 
            --glass-bg: rgba(0, 0, 0, 0.45);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        
        body { 
            background-color: #000; width: 100vw; height: 100vh; 
            overflow: hidden; display: flex; align-items: center; justify-content: center; 
        }

        .main-container {
            transform: rotate(90deg);
            width: 100vh; height: 100vw;
            display: flex; flex-direction: column;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.5)), 
                        url("bg.png") center/cover no-repeat;
            position: absolute; border: 4px solid var(--gold-3d);
        }

        .top-section {
            height: 38vh; 
            display: flex; flex-direction: column;
            background: var(--glass-bg); 
            backdrop-filter: blur(10px);
            border-bottom: 4px solid var(--gold-3d);
            justify-content: center; text-align: center;
            padding-top: 2vh;
        }

        .mosque-name { font-family: 'Amiri', serif; font-size: 7.5vh; color: var(--white); text-shadow: 0 0 20px var(--gold-3d); }
        .date-info { font-size: 2.8vh; color: var(--gold-3d); font-weight: 700; margin-top: 1vh; text-shadow: 2px 2px 4px #000; }

        .clock-area { display: flex; align-items: center; justify-content: center; gap: 2vw; margin-top: 2vh; }
        #clock { font-size: 16vh; font-weight: 900; color: var(--gold-3d); line-height: 0.8; text-shadow: 4px 4px 10px rgba(0, 0, 0, 0.8); }
        #ampm { font-size: 5.5vh; color: var(--white); font-weight: 800; text-shadow: 2px 2px 8px #000; }

        /* منطقة الأذكار المحسنة */
        .zikr-section {
            flex: 1; display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 0 6vw;
        }
        #zikr { 
            font-size: 6.5vh; font-weight: 800; color: var(--white); 
            text-shadow: 3px 3px 15px #000; line-height: 1.4;
            transition: opacity 0.8s ease-in-out; /* انتقال ناعم جداً */
            opacity: 1;
        }

        .prayer-section {
            height: 52vh; 
            display: flex; flex-direction: column;
            border-top: 4px solid var(--gold-3d); 
            background: var(--glass-bg); 
            backdrop-filter: blur(10px);
            margin-top: -10vh; 
            padding-bottom: 5vh; 
            position: relative; z-index: 10;
        }

        .next-prayer-box {
            background: rgba(255, 215, 0, 0.15);
            padding: 1.5vh; border-bottom: 2px solid var(--gold-3d);
            text-align: center;
        }
        #timer-label { font-size: 3.5vh; color: var(--white); font-weight: 700; }
        #timer { font-size: 8.5vh; color: var(--gold-3d); font-weight: 900; letter-spacing: 4px; }

        .prayer-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; padding: 1vh 0; }
        .prayer-col { display: flex; flex-direction: column; justify-content: space-around; }
        .v-line { border-left: 2px solid rgba(255, 215, 0, 0.25); }

        .prayer-item { display: flex; justify-content: space-between; align-items: center; padding: 0 4vw; }
        .p-name { font-size: 5vh; color: var(--white); font-weight: 800; text-shadow: 2px 2px 5px #000; }
        .p-val-box { display: flex; align-items: baseline; }
        .p-val { font-size: 7vh; color: var(--gold-3d); font-weight: 900; text-shadow: 3px 3px 6px #000; }
        .p-suf { font-size: 3.5vh; color: var(--white); margin-right: 10px; font-weight: 700; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="top-section">
        <div class="mosque-name">جامع الأمير فواز</div>
        <div class="date-info"><span id="hijri">--</span> | <span id="miladi">--</span></div>
        <div class="clock-area">
            <div id="clock">00:00</div>
            <div id="ampm">--</div>
        </div>
    </div>

    <div class="zikr-section">
        <div id="zikr">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
    </div>

    <div class="prayer-section">
        <div class="next-prayer-box">
            <span id="timer-label">الصلاة القادمة بعد: </span>
            <span id="timer">00:00:00</span>
        </div>
        <div class="prayer-grid">
            <div class="prayer-col v-line" id="rCol"></div>
            <div class="prayer-col" id="lCol"></div>
        </div>
    </div>
</div>

<script>
    const prayerData = [
        {n: "الفجر", h: 5, m: 10}, {n: "الشروق", h: 6, m: 34}, {n: "الظهر", h: 12, m: 20},
        {n: "العصر", h: 15, m: 34}, {n: "المغرب", h: 18, m: 6}, {n: "العشاء", h: 19, m: 31}
    ];

    const azkar = [
        "سبحان الله وبحمده، سبحان الله العظيم",
        "اللهم صلِّ وسلم على نبينا محمد",
        "لا حول ولا قوة إلا بالله العلي العظيم",
        "أستغفر الله العظيم وأتوب إليه",
        "قال ﷺ: كَلِمَتَانِ خَفِيفَتَانِ عَلَى اللِّسَانِ ثَقِيلَتَانِ فِي الْمِيزَانِ..",
        "سبحان الله والحمد لله ولا إله إلا الله والله أكبر",
        "يا حي يا قيوم برحمتك أستغيث",
        "لا إله إلا الله وحده لا شريك له، له الملك وله الحمد",
        "اللهم أنت ربي لا إله إلا أنت خلقتني وأنا عبدك",
        "قال ﷺ: من صلى عليّ صلاة صلى الله عليه بها عشراً",
        "اللهم إني أسألك علماً نافعاً ورزقاً طيباً",
        "رضيت بالله رباً وبالإسلام ديناً وبمحمد نبياً",
        "اللهم عافني في بدني، اللهم عافني في سمعي",
        "قال ﷺ: بلغوا عني ولو آية",
        "اللهم إنك عفو تحب العفو فاعف عني",
        "حسبي الله لا إله إلا هو عليه توكلت",
        "بسم الله الذي لا يضر مع اسمه شيء في الأرض ولا في السماء",
        "قال ﷺ: خيركم من تعلم القرآن وعلمه",
        "اللهم إني أعوذ بك من الهم والحزن والعجز والكسل",
        "لا إله إلا أنت سبحانك إني كنت من الظالمين",
        "يا مقلب القلوب ثبت قلبي على دينك",
        "رب اغفر لي ولوالدي وللمؤمنين والمؤمنات",
        "قال ﷺ: الطهور شطر الإيمان",
        "الحمد لله حمداً كثيراً طيباً مباركاً فيه",
        "اللهم قني عذابك يوم تبعث عبادك",
        "قال ﷺ: اتقوا النار ولو بشق تمرة",
        "اللهم اجعل في قلبي نوراً وفي بصري نوراً",
        "قال ﷺ: الدين النصيحة",
        "أعوذ بكلمات الله التامات من شر ما خلق",
        "اللهم بارك لنا فيما رزقتنا وقنا عذاب النار",
        "قال ﷺ: المسلم من سلم المسلمون من لسانه ويده",
        "سبحان الله عدد خلقه ورضا نفسه وزنة عرشه",
        "اللهم بك أصبحنا وبك أمسينا وبك نحيا وبك نموت",
        "قال ﷺ: تهادوا تحابوا",
        "اللهم رب السماوات ورب الأرض ورب العرش العظيم",
        "قال ﷺ: إذا قامت الساعة وفِي يد أحدكم فسيلة فليغرسها",
        "اللهم أعنا على ذكرك وشكرك وحسن عبادتك",
        "قال ﷺ: سيد الاستغفار أن تقول اللهم أنت ربي..",
        "يا ذا الجلال والإكرام",
        "اللهم إنا نسألك الجنة ونعوذ بك من النار",
        "قال ﷺ: من سلك طريقاً يلتمس فيه علماً سهل الله له طريقاً إلى الجنة",
        "اللهم احفظنا بحفظك يا أرحم الراحمين",
        "قال ﷺ: الصبر ضياء",
        "اللهم اكفني بحلالك عن حرامك وأغنني بفضلك عمن سواك",
        "اللهم آتنا في الدنيا حسنة وفي الآخرة حسنة",
        "قال ﷺ: ليس الغنى عن كثرة العرض ولكن الغنى غنى النفس",
        "سبحان الله وبحمده مائة مرة",
        "اللهم اغفر للمسلمين والمسلمات والأحياء منهم والأموات",
        "قال ﷺ: من قال سبحان الله العظيم وبحمده غرست له نخلة في الجنة",
        "اللهم أصلح لي ديني الذي هو عصمة أمري",
        "اللهم إني أسألك الهدى والتقى والعفاف والغنى"
    ];

    function fmt12(h, m) {
        let s = h >= 12 ? "م" : "ص";
        let h12 = h % 12 || 12;
        return `<div class="p-val-box"><span class="p-val">${String(h12).padStart(2,'0')}:${String(m).padStart(2,'0')}</span><span class="p-suf">${s}</span></div>`;
    }

    function init() {
        const r = document.getElementById("rCol"), l = document.getElementById("lCol");
        r.innerHTML = ""; l.innerHTML = "";
        prayerData.forEach((p, i) => {
            const h = `<div class="prayer-item"><div class="p-name">${p.n}</div>${fmt12(p.h, p.m)}</div>`;
            if (i < 3) r.innerHTML += h; else l.innerHTML += h;
        });
    }

    function update() {
        const now = new Date();
        let hrs = now.getHours(), min = now.getMinutes();
        let ampmStr = hrs >= 12 ? "مساءً" : "صباحاً";
        let hrs12 = hrs % 12 || 12;
        document.getElementById("clock").innerText = `${String(hrs12).padStart(2,'0')}:${String(min).padStart(2,'0')}`;
        document.getElementById("ampm").innerText = ampmStr;

        document.getElementById("miladi").innerText = now.toLocaleDateString('ar-SA', {day:'numeric', month:'long', year:'numeric'});
        document.getElementById("hijri").innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', {day:'numeric', month:'long', year:'numeric'}).format(now);

        let cur = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();
        let next = 0;
        for(let p of prayerData) {
            let ps = p.h*3600 + p.m*60;
            if(ps > cur) { next = ps; break; }
        }
        if(!next) next = prayerData[0].h*3600 + prayerData[0].m*60 + 86400;
        let diff = next - cur;
        let h = Math.floor(diff/3600), m = Math.floor((diff%3600)/60), s = diff%60;
        document.getElementById("timer").innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    init(); update(); setInterval(update, 1000);

    // نظام تبديل الأذكار المطور لمنع الاختفاء
    let z = 0; 
    setInterval(() => { 
        const zElem = document.getElementById("zikr");
        zElem.style.opacity = 0; // يبدأ بالاختفاء التدريجي
        setTimeout(() => { 
            zElem.innerText = azkar[++z % azkar.length]; 
            zElem.style.opacity = 1; // يظهر النص الجديد
        }, 800); // سرعة الانتقال
    }, 15000); // تغيير كل 15 ثانية
</script>
</body>
</html>
