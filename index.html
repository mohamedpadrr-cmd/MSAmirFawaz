<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مواقيت الصلاة - جامع الأمير فواز</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; /* ذهبي ملكي */
            --light-gold: #f1d592; 
            --islamic-pattern: url('https://www.transparenttextures.com/patterns/islamic-art.png');
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: #0c1a1a url('https://images.unsplash.com/photo-1591604129939-f1efa4d9f7fa?q=80&w=2000') center/cover no-repeat;
            color: var(--light-gold); font-family: 'Tajawal', sans-serif; height: 100vh; overflow: hidden;
        }

        .overlay { 
            position: absolute; inset: 0; 
            background: linear-gradient(rgba(12, 26, 26, 0.85), rgba(12, 26, 26, 0.95)), var(--islamic-pattern); 
            z-index: 1; 
        }

        .wrapper { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; }

        .top-bar { 
            background: rgba(0, 0, 0, 0.9); display: flex; justify-content: space-between; 
            padding: 15px 50px; border-bottom: 2px solid var(--gold); font-size: 1.8rem; font-weight: bold;
            color: var(--gold);
        }

        .main-content { 
            display: grid; grid-template-columns: 380px 1fr; gap: 30px; 
            padding: 30px; flex: 1; align-items: stretch;
        }

        .left-panel { 
            background: rgba(20, 40, 40, 0.8); border: 2px solid var(--gold); 
            border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        #digi-time { font-size: 8rem; font-weight: 900; color: var(--gold); line-height: 1; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        #ampm { font-size: 2.5rem; color: var(--gold); margin-bottom: 15px; }

        /* لوحة الأذكار - تم تغيير الخلفية لصورة الكعبة وتعديل لون النص ليكون واضحاً */
        .center-panel { 
            background: #000 url('https://mohamedpadrr-cmd.github.io/MSAmirFawaz/static/media/bg.c5485458156157e1df23.jpg') center/cover no-repeat;
            border-radius: 30px; 
            border: 6px solid var(--gold); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 60px; text-align: center;
            box-shadow: inset 0 0 30px rgba(212, 175, 55, 0.1);
            position: relative; overflow: hidden;
        }

        /* طبقة تظليل فوق صورة الكعبة لضمان وضوح النص الذهبي */
        .center-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.6); /* تظليل داكن بنسبة 60% */
            z-index: 1;
        }
        
        #zikr-text { 
            font-size: 3.8rem; 
            font-weight: 900; 
            line-height: 1.6; 
            color: var(--gold);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); /* ظل داكن لزيادة وضوح النص الذهبي */
            z-index: 2; /* النص فوق طبقة التظليل */
            position: relative;
        }

        .bottom-grid { 
            display: grid; grid-template-columns: repeat(6, 1fr); 
            height: 180px; background: rgba(0, 20, 20, 0.95); border-top: 3px solid var(--gold);
        }
        .p-box { 
            border-left: 1px solid rgba(212, 175, 55, 0.2); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
        }
        .p-box.active { 
            background: rgba(212, 175, 55, 0.2); 
            border-top: 8px solid var(--gold); 
        }
        .p-box .name { font-size: 1.8rem; color: var(--gold); margin-bottom: 5px; font-weight: bold; }
        .p-box .time { font-size: 2.5rem; font-weight: 900; color: var(--light-gold); }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="wrapper">
        <div class="top-bar">
            <div id="en-date">Loading...</div>
            <div style="color:var(--gold); font-size: 2.2rem;">جامع الأمير فواز - جدة</div>
            <div id="ar-date">جاري التحميل...</div>
        </div>

        <div class="main-content">
            <div class="left-panel">
                <div id="digi-time">00:00</div>
                <div id="ampm">--</div>
                <div style="color:var(--gold); font-size:1.6rem; border-top:1px solid rgba(212, 175, 55, 0.3); padding-top:15px; width:80%; text-align:center;">
                    الصلاة القادمة: <br>
                    <span id="next-prayer-name" style="color:var(--light-gold); font-weight:bold; font-size:2.2rem;">--</span>
                </div>
            </div>

            <div class="center-panel">
                <div id="zikr-text">«سبحان الله وبحمده، سبحان الله العظيم»</div>
            </div>
        </div>

        <div class="bottom-grid" id="prayer-list"></div>
    </div>

<script>
    const prayerSchedule = [
        { n: 'الفجر', t: '5:21 ص' },
        { n: 'الشروق', t: '6:38 ص' },
        { n: 'الظهر', t: '12:31 م' },
        { n: 'العصر', t: '3:52 م' },
        { n: 'المغرب', t: '6:24 م' },
        { n: 'العشاء', t: '7:54 م' }
    ];

    function updateDashboard() {
        const now = new Date();
        
        let h = now.getHours();
        const m = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('digi-time').innerText = `${h % 12 || 12}:${m}`;
        document.getElementById('ampm').innerText = h >= 12 ? 'مساءً' : 'صباحاً';

        document.getElementById('en-date').innerText = now.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'});
        document.getElementById('ar-date').innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura', {day:'numeric', month:'long', year:'numeric', weekday:'long'}).format(now);

        const currentMinutes = h * 60 + now.getMinutes();
        let nextIndex = 0;
        if (currentMinutes > (19 * 60 + 54)) nextIndex = 0;
        else if (currentMinutes > (18 * 60 + 24)) nextIndex = 5;
        else if (currentMinutes > (15 * 60 + 52)) nextIndex = 4;
        else if (currentMinutes > (12 * 60 + 31)) nextIndex = 3;
        else if (currentMinutes > (6 * 60 + 38)) nextIndex = 2;
        else if (currentMinutes > (5 * 60 + 21)) nextIndex = 1;
        else nextIndex = 0;

        document.getElementById('next-prayer-name').innerText = prayerSchedule[nextIndex].n;

        const grid = document.getElementById('prayer-list');
        grid.innerHTML = prayerSchedule.map((p, index) => `
            <div class="p-box ${index === nextIndex ? 'active' : ''}">
                <div class="name">${p.n}</div>
                <div class="time">${p.t}</div>
            </div>
        `).join('');
    }

    const azkar = [
        "«سبحان الله وبحمده، سبحان الله العظيم»",
        "«لا إله إلا الله وحده لا شريك له، له الملك وله الحمد وهو على كل شيء قدير»",
        "«اللهم صلِ وسلم على نبينا محمد»",
        "«اللهم أعنا على ذكرك وشكرك وحسن عبادتك»"
    ];
    let zIdx = 0;
    setInterval(() => {
        zIdx = (zIdx + 1) % azkar.length;
        document.getElementById('zikr-text').innerText = azkar[zIdx];
    }, 25000);

    setInterval(updateDashboard, 1000);
    updateDashboard();
</script>
</body>
</html>
