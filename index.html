<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة جامع الأمير فواز</title>
    <style>
        :root {
            --gold: #dfbd69;
            --bg-dark: #000;
            --box-bg: rgba(15, 15, 15, 0.95);
            --border: #444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://raw.githubusercontent.com');
            background-size: cover;
            background-position: center;
        }

        /* 1️⃣ القسم الأيمن: العنوان والمربع الذهبي للأذكار */
        .right-side {
            position: absolute;
            top: 50px;
            right: 60px;
            width: 450px;
            text-align: center;
        }

        .mosque-title {
            font-size: 5.5rem;
            color: var(--gold);
            font-weight: bold;
            margin-bottom: 40px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        /* المربع الذهبي للأذكار */
        .dhikr-box {
            border: 4px solid var(--gold);
            background: var(--box-bg);
            border-radius: 25px;
            padding: 50px 20px;
            font-size: 6.5rem;
            font-weight: bold;
            line-height: 1.3;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(223, 189, 105, 0.2);
            transition: opacity 1s ease-in-out;
        }

        /* 2️⃣ القسم الأيسر: الساعة الرقمية والتواريخ */
        .left-side {
            position: absolute;
            top: 50px;
            left: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .digital-clock {
            font-size: 9rem;
            color: var(--gold);
            background: var(--box-bg);
            padding: 10px 80px;
            border-radius: 25px;
            border: 2px solid var(--border);
            font-weight: bold;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .dates-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .date-row {
            background: var(--box-bg);
            font-size: 2.5rem;
            padding: 15px 40px;
            border-radius: 15px;
            border: 1px solid var(--border);
            text-align: center;
            color: #eee;
        }

        /* 3️⃣ القسم السفلي: شريط مواقيت الصلاة الكامل */
        .bottom-section {
            position: absolute;
            bottom: 40px;
            width: 100%;
            padding: 0 50px;
        }

        .prayer-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .prayer-card {
            background: rgba(10, 10, 10, 0.95);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 25px 10px;
            text-align: center;
            position: relative;
        }

        .prayer-card.active {
            border-color: var(--gold);
            background: rgba(223, 189, 105, 0.2);
            box-shadow: 0 0 25px var(--gold);
            transform: scale(1.05);
        }

        .next-tag {
            position: absolute; top: -22px; left: 50%; transform: translateX(-50%);
            background: var(--gold); color: black; padding: 4px 25px;
            border-radius: 10px; font-size: 1.2rem; font-weight: bold;
            display: none;
        }
        .active .next-tag { display: block; }

        .p-name { font-size: 2.2rem; color: #bbb; margin-bottom: 10px; font-weight: bold; }
        .active .p-name { color: white; }
        .p-time { font-size: 3rem; font-weight: bold; }

        .iqama-row {
            display: flex;
            justify-content: flex-end;
        }

        .iqama-bar {
            background: var(--gold);
            color: black;
            font-size: 3.5rem;
            font-weight: bold;
            padding: 12px 100px;
            border-radius: 20px;
            width: 450px;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- اليمين: الجامع والأذكار -->
    <div class="right-side">
        <div class="mosque-title">جَامِع الأَمير فَواز</div>
        <div class="dhikr-box" id="dhikr">أستغفر الله العظيم</div>
    </div>

    <!-- اليسار: الساعة والتواريخ -->
    <div class="left-side">
        <div class="digital-clock" id="digi-clock">00:00 ص</div>
        <div class="dates-container">
            <div class="date-row" id="m-date">-- --- 2024 م</div>
            <div class="date-row" id="h-date" style="color: var(--gold);">-- --- 1446 هـ</div>
        </div>
    </div>

    <!-- الأسفل: المواقيت والإقامة -->
    <div class="bottom-section">
        <div class="prayer-grid" id="prayer-grid">
            <!-- يتم تعبئتها تلقائياً -->
        </div>
        <div class="iqama-row">
            <div class="iqama-bar">الإقامة بعد: 10:00 د</div>
        </div>
    </div>

    <script>
        // الأذكار تتغير كل 30 ثانية مع تأثير تلاشي
        const dhikrs = ["أستغفر الله العظيم", "لا إله إلا الله", "سبحان الله وبحمده", "صلّ على محمد", "الحمد لله رب العالمين"];
        let dIdx = 0;
        setInterval(() => {
            const dhikrEl = document.getElementById('dhikr');
            dhikrEl.style.opacity = 0;
            setTimeout(() => {
                dIdx = (dIdx + 1) % dhikrs.length;
                dhikrEl.innerText = dhikrs[dIdx];
                dhikrEl.style.opacity = 1;
            }, 1000);
        }, 30000);

        // جلب مواقيت الصلاة لمدينة جدة تلقائياً
        async function fetchPrayers() {
            try {
                const res = await fetch('https://api.aladhan.com');
                const data = await res.json();
                const t = data.data.timings;
                const list = [
                    {n: "الفجر", t: t.Fajr}, {n: "الشروق", t: t.Sunrise}, {n: "الظهر", t: t.Dhuhr},
                    {n: "العصر", t: t.Asr}, {n: "المغرب", t: t.Maghrib}, {n: "العشاء", t: t.Isha}
                ];
                renderPrayers(list);
            } catch(e) { console.log("خطأ في الاتصال بالإنترنت"); }
        }

        function format12(t24) {
            let [h, m] = t24.split(':'); h = parseInt(h);
            const ampm = h >= 12 ? 'م' : 'ص';
            return `${h % 12 || 12}:${m} ${ampm}`;
        }

        function renderPrayers(list) {
            const grid = document.getElementById('prayer-grid');
            grid.innerHTML = '';
            const now = new Date();
            const currMin = now.getHours() * 60 + now.getMinutes();
            let nextIdx = 0;
            for(let i=0; i<list.length; i++){
                const [h, m] = list[i].t.split(':').map(Number);
                if(currMin < (h * 60 + m)) { nextIdx = i; break; }
            }
            list.forEach((p, i) => {
                const active = i === nextIdx ? 'active' : '';
                grid.innerHTML += `<div class="prayer-card ${active}"><div class="next-tag">الصلاة القادمة</div><div class="p-name">${p.n}</div><div class="p-time">${format12(p.t)}</div></div>`;
            });
        }

        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            const m = String(now.getMinutes()).padStart(2, '0');
            const ampm = h >= 12 ? 'م' : 'ص';
            document.getElementById('digi-clock').innerText = `${h % 12 || 12}:${m} ${ampm}`;
            
            // التواريخ
            const opt = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('m-date').innerText = now.toLocaleDateString('ar-SA', opt) + " م";
            document.getElementById('h-date').innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-uma', {day:'numeric', month:'long', year:'numeric'}).format(now) + " هـ";
        }

        setInterval(updateClock, 1000);
        updateClock();
        fetchPrayers();
        setInterval(fetchPrayers, 3600000);
    </script>
</body>
</html>
