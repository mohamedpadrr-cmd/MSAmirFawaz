<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مواقيت الصلاة - جامع الأمير فواز</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold-3d: linear-gradient(to bottom, #f1d592 0%, #d4af37 40%, #b2945e 100%);
            --real-gold: #d4af37;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            /* صورة المسجد النبوي كخلفية كاملة */
            background: #000 url('https://images.unsplash.com/photo-1591604129939-f1efa4d9f7fa?q=80&w=2000') center/cover no-repeat fixed;
            color: #fff; font-family: 'Tajawal', sans-serif; height: 100vh; overflow: hidden;
        }

        /* طبقة تظليل فوق الصورة لضمان وضوح الكتابة */
        .overlay { 
            position: absolute; inset: 0; 
            background: rgba(0, 0, 0, 0.65); 
            z-index: 1; 
        }

        .wrapper { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; }

        .top-bar { 
            background: rgba(0, 0, 0, 0.8); display: flex; justify-content: space-between; 
            padding: 15px 50px; border-bottom: 3px solid var(--real-gold); font-size: 2rem; font-weight: bold;
            color: var(--real-gold);
        }

        .main-content { 
            display: grid; grid-template-columns: 420px 1fr; gap: 30px; 
            padding: 30px; flex: 1; align-items: stretch;
        }

        .left-panel { 
            background: rgba(0, 0, 0, 0.7); border: 2px solid var(--real-gold); 
            border-radius: 25px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #digi-time { font-size: 9rem; font-weight: 900; color: var(--real-gold); line-height: 1; text-shadow: 3px 3px 10px rgba(0,0,0,1); }
        #ampm { font-size: 3rem; color: var(--real-gold); margin-bottom: 20px; }

        .center-panel { 
            background: rgba(0, 0, 0, 0.5); border-radius: 40px; border: 4px solid var(--real-gold); 
            display: flex; align-items: center; justify-content: center; padding: 40px; text-align: center;
        }
        
        #zikr-text { 
            font-size: 4.5rem; font-weight: 900; line-height: 1.5; color: var(--real-gold);
            text-shadow: 4px 4px 15px rgba(0,0,0,1);
        }

        /* شريط المواقيت السفلي الأسود الملكي مع شفافية بسيطة */
        .bottom-grid { 
            display: grid; grid-template-columns: repeat(6, 1fr); 
            height: 220px; background: rgba(0, 0, 0, 0.85); border-top: 4px solid var(--real-gold);
        }

        .p-box { 
            border-left: 1px solid rgba(212, 175, 55, 0.3); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
        }
        
        .p-box.active { 
            background: rgba(212, 175, 55, 0.15);
            border-top: 10px solid var(--real-gold);
        }

        .p-box .name { font-size: 2rem; color: #fff; margin-bottom: 10px; font-weight: bold; }

        /* الأرقام الذهبية الملكية 3D */
        .p-box .time { 
            font-size: 3.5rem; 
            font-weight: 900; 
            background: var(--gold-3d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(2px 4px 3px rgba(0,0,0,1));
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="wrapper">
        <div class="top-bar">
            <div id="en-date">Loading...</div>
            <div style="font-size: 2.5rem; text-shadow: 2px 2px 5px #000;">جامع الأمير فواز - جدة</div>
            <div id="ar-date">Loading...</div>
        </div>

        <div class="main-content">
            <div class="left-panel">
                <div id="digi-time">00:00</div>
                <div id="ampm">--</div>
                <div style="color:#fff; font-size:1.8rem; border-top:1px solid var(--real-gold); padding-top:20px; width:80%; text-align:center;">
                    الصلاة القادمة: <br>
                    <span id="next-prayer-name" style="color:var(--real-gold); font-weight:bold; font-size:2.8rem;">--</span>
                </div>
            </div>

            <div class="center-panel">
                <div id="zikr-text">جاري التحميل...</div>
            </div>
        </div>

        <div class="bottom-grid" id="prayer-list"></div>
    </div>

<script>
    const prayerSchedule = [
        { n: 'الفجر', t: '5:21 ص' },
        { n: 'الشروق', t: '6:38 ص' },
        { n: 'الظهر', t: '12:31 م' },
        { n: 'العصر', t: '3:52 م' },
        { n: 'المغرب', t: '6:24 م' },
        { n: 'العشاء', t: '7:54 م' }
    ];

    function updateDashboard() {
        const now = new Date();
        let h = now.getHours();
        const m = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('digi-time').innerText = `${h % 12 || 12}:${m}`;
        document.getElementById('ampm').innerText = h >= 12 ? 'مساءً' : 'صباحاً';

        document.getElementById('en-date').innerText = now.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'});
        document.getElementById('ar-date').innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura', {day:'numeric', month:'long', year:'numeric', weekday:'long'}).format(now);

        const currentMinutes = h * 60 + now.getMinutes();
        let nextIndex = 0;
        if (currentMinutes > (19 * 60 + 54)) nextIndex = 0;
        else if (currentMinutes > (18 * 60 + 24)) nextIndex = 5;
        else if (currentMinutes > (15 * 60 + 52)) nextIndex = 4;
        else if (currentMinutes > (12 * 60 + 31)) nextIndex = 3;
        else if (currentMinutes > (6 * 60 + 38)) nextIndex = 2;
        else if (currentMinutes > (5 * 60 + 21)) nextIndex = 1;
        else nextIndex = 0;

        document.getElementById('next-prayer-name').innerText = prayerSchedule[nextIndex].n;

        const grid = document.getElementById('prayer-list');
        grid.innerHTML = prayerSchedule.map((p, index) => `
            <div class="p-box ${index === nextIndex ? 'active' : ''}">
                <div class="name">${p.n}</div>
                <div class="time">${p.t}</div>
            </div>
        `).join('');
    }

    const azkar = [
        "«سبحان الله وبحمده، سبحان الله العظيم»",
        "«لا إله إلا الله وحده لا شريك له، له الملك وله الحمد وهو على كل شيء قدير»",
        "«اللهم صلِ وسلم على نبينا محمد»",
        "«اللهم أعنا على ذكرك وشكرك وحسن عبادتك»"
    ];
    let zIdx = 0;
    function cycleZikr() {
        document.getElementById('zikr-text').innerText = azkar[zIdx];
        zIdx = (zIdx + 1) % azkar.length;
    }
    cycleZikr();
    setInterval(cycleZikr, 20000);
    setInterval(updateDashboard, 1000);
    updateDashboard();
</script>
</body>
</html>
