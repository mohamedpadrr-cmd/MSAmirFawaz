<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شاشة جامع الأمير فواز</title>
<style>
:root{
--gold:#D4AF37;
--white:#F5F5F5;
--glass:rgba(0,0,0,0.35);
--iqama-color: #00FFCC;
}

*{ margin:0; padding:0; box-sizing:border-box; font-family:'Tajawal',sans-serif; }

body{
background:#000;
width:100vw; height:100vh;
overflow:hidden;
display:flex; align-items:center; justify-content:center;
}

.main-container{
transform:rotate(90deg);
width:100vh; height:100vw;
display:flex; flex-direction:column;
background: linear-gradient(rgba(0,0,0,.2),rgba(0,0,0,.4)), url("bg.png") center/cover no-repeat;
position:absolute;
}

/* القسم العلوي - مزاح للأسفل 2 سم */
.top-section{
height:28vh;
display:flex; flex-direction:column;
align-items:center; justify-content:center;
gap:1vh; 
margin-top: calc(2vh + 2cm); 
}

.name-box{
background:var(--glass);
backdrop-filter:blur(8px);
padding:1vh 3vw; border-radius:20px;
border:1px solid rgba(212,175,55,.3);
text-align:center; min-width: 45vh;
}

.mosque-name{ font-size:4.2vh; color:white; text-shadow:0 0 20px var(--gold); }
.date-container { border-top: 1px solid rgba(212,175,55,0.2); padding-top: 5px; }
.date-info{ font-size:2.5vh; color:var(--gold); font-weight:700; }
.date-info.miladi { color: #fff; font-size: 2vh; opacity: 0.8; }

.clock-box{
background:var(--glass); backdrop-filter:blur(8px);
padding:1vh 4vw; border-radius:20px;
border:1px solid rgba(212,175,55,.3);
display:flex; align-items:center; gap:1.5vw;
}
#clock{ font-size:9vh; font-weight:900; color:var(--gold); text-shadow:0 0 10px #000; }
#ampm{ font-size:3.2vh; color:white; }

/* قسم الأحاديث مع التوهج */
.zikr-section{
flex: 1; 
display:flex; align-items:center; justify-content:center;
padding: 0 6vw;
}
#zikr{ 
font-size:4.2vh; 
font-weight:800; 
color:white; 
text-shadow: 0 0 15px rgba(212,175,55,0.8), 0 0 30px rgba(0,0,0,0.8);
text-align:center; 
line-height: 1.4;
transition: opacity 1s;
}

/* قسم الصلوات */
.prayer-section{
width: 100%;
display:flex; flex-direction:column;
background:rgba(0,0,0,0.65);
backdrop-filter:blur(15px);
border-top:3px solid var(--gold);
padding-bottom: 1.5vh;
margin-bottom: 2.5cm; /* تم إنزاله 1 سم إضافي */
}

.next-prayer-box{
background:rgba(212,175,55,0.15);
padding:0.5vh; text-align:center;
border-bottom:1px solid var(--gold);
margin-bottom: 0.5vh;
}
#timer-label{ font-size:2.8vh; color:white; }
#timer{ font-size:6vh; color:var(--gold); font-weight:900; }

.iqama-mode { background: rgba(0, 255, 204, 0.2) !important; }
.iqama-mode #timer { color: var(--iqama-color) !important; text-shadow: 0 0 20px var(--iqama-color); }
.iqama-mode #timer-label { color: var(--iqama-color) !important; }

.prayer-header {
display: grid; grid-template-columns: 1.5fr 1fr 1fr;
padding: 1vh 5vw; color: var(--gold);
font-size: 2.2vh; font-weight: bold; text-align: center;
}

.prayer-grid{ 
display:flex; flex-direction: column; 
gap: 0.5cm; 
padding: 0 3vw;
}

.prayer-item{ 
display: grid; 
grid-template-columns: 1.5fr 1fr 1fr; 
align-items:center; 
padding: 0.8vh 2vw; 
text-align: center; 
border-radius: 10px;
}

.p-name{ font-size:3.8vh; color:white; font-weight:800; text-align: right; padding-right: 5vw; }
.p-val{ font-size:4.2vh; color:var(--gold); font-weight:900; }
.iqama-val { font-size:3.8vh; color: var(--iqama-color); font-weight: 800; }

.next-prayer{ 
background:rgba(212,175,55,0.25); 
box-shadow: inset 0 0 15px rgba(212,175,55,0.2);
}
</style>
</head>
<body>
<!-- بقية الكود كما هو بدون أي تغيير -->
</body>
</html>
