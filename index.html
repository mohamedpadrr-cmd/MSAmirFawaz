<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جامع الأمير فواز - مواقيت الصلاة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/adhan@4.4.1/dist/Adhan.min.js"></script>
    <style>
        :root { 
            --gold: #b2945e; 
            --neon-green: #00ff00; 
            --sky-blue: #0077b6; /* لون سماوي عميق */
            --light-sky: #e0f2f1; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--sky-blue) url('https://images.unsplash.com/photo-1591604129939-f1efa4d9f7fa?q=80&w=2000') center/cover no-repeat;
            color: white; font-family: 'Tajawal', sans-serif; height: 100vh; overflow: hidden;
        }

        /* طبقة شفافة سماوية فوق الخلفية */
        .overlay { position: absolute; inset: 0; background: rgba(0, 119, 182, 0.6); z-index: 1; }
        .wrapper { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; }

        /* الشريط العلوي السماوي */
        .top-bar { 
            background: rgba(0, 105, 148, 0.9); display: flex; justify-content: space-between; 
            padding: 15px 50px; border-bottom: 2px solid var(--gold); font-size: 1.8rem; font-weight: bold;
        }

        .main-content { 
            display: grid; grid-template-columns: 380px 1fr; gap: 30px; 
            padding: 30px; flex: 1; align-items: stretch;
        }

        /* صندوق الساعة السماوي */
        .left-panel { 
            background: rgba(0, 75, 110, 0.85); border: 2px solid var(--gold); 
            border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #digi-time { font-size: 8rem; font-weight: 900; color: var(--neon-green); line-height: 1; }
        #ampm { font-size: 2.5rem; color: var(--neon-green); margin-bottom: 15px; }

        /* لوحة الأذكار */
        .center-panel { 
            background: rgba(255, 255, 255, 0.95); border-radius: 30px; 
            border: 6px solid var(--gold); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 60px; text-align: center; color: #004b6e;
        }
        
        #zikr-text { font-size: 3.5rem; font-weight: 900; line-height: 1.6; }

        /* شريط المواقيت السفلي السماوي */
        .bottom-grid { 
            display: grid; grid-template-columns: repeat(6, 1fr); 
            height: 180px; background: rgba(0, 60, 90, 0.95); border-top: 3px solid var(--gold);
        }
        .p-box { 
            border-left: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
        }
        .p-box.active { background: #005f73; border-top: 8px solid var(--neon-green); }
        .p-box .name { font-size: 1.8rem; color: var(--gold); margin-bottom: 5px; }
        .p-box .time { font-size: 2.2rem; font-weight: 900; color: #fff; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="wrapper">
        <div class="top-bar">
            <div id="en-date">Tuesday, March 3, 2026</div>
            <div style="color:var(--gold)">جامع الأمير فواز - جدة</div>
            <div id="ar-date">Loading...</div>
        </div>

        <div class="main-content">
            <div class="left-panel">
                <div id="digi-time">00:00</div>
                <div id="ampm">--</div>
                <div style="color:#fff; font-size:1.6rem; border-top:1px solid rgba(255,255,255,0.2); padding-top:15px; width:80%; text-align:center;">
                    الصلاة القادمة: <br>
                    <span id="next-prayer-name" style="color:var(--neon-green); font-weight:bold; font-size:2rem;">--</span>
                </div>
            </div>

            <div class="center-panel">
                <div id="zikr-text">«سبحان الله وبحمده، سبحان الله العظيم»</div>
            </div>
        </div>

        <div class="bottom-grid" id="prayer-list"></div>
    </div>

<script>
    function updateDashboard() {
        const now = new Date();
        
        // 1. الوقت الحالي
        let h = now.getHours();
        const m = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('digi-time').innerText = `${h % 12 || 12}:${m}`;
        document.getElementById('ampm').innerText = h >= 12 ? 'مساءً' : 'صباحاً';

        // 2. التواريخ
        document.getElementById('en-date').innerText = now.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'});
        document.getElementById('ar-date').innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura', {day:'numeric', month:'long', year:'numeric', weekday:'long'}).format(now);

        // 3. حساب المواقيت (جدة)
        const coords = new adhan.Coordinates(21.4858, 39.1925);
        const params = adhan.CalculationMethod.UmmAlQura();
        const pTimes = new adhan.PrayerTimes(coords, now, params);

        const prayers = [
            { n: 'الفجر', t: pTimes.fajr, id: 'fajr' },
            { n: 'الشروق', t: pTimes.sunrise, id: 'sunrise' },
            { n: 'الظهر', t: pTimes.dhuhr, id: 'dhuhr' },
            { n: 'العصر', t: pTimes.asr, id: 'asr' },
            { n: 'المغرب', t: pTimes.maghrib, id: 'maghrib' },
            { n: 'العشاء', t: pTimes.isha, id: 'isha' }
        ];

        const nextPId = pTimes.nextPrayer();
        const nextPMap = { 'fajr': 'الفجر', 'sunrise': 'الشروق', 'dhuhr': 'الظهر', 'asr': 'العصر', 'maghrib': 'المغرب', 'isha': 'العشاء', 'none': 'الفجر' };
        document.getElementById('next-prayer-name').innerText = nextPMap[nextPId] || 'الفجر';

        const grid = document.getElementById('prayer-list');
        grid.innerHTML = prayers.map(p => {
            const isActive = (nextPId === p.id);
            // نظام 12 ساعة
            const timeStr = p.t.toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit', hour12: true}).replace('AM', 'ص').replace('PM', 'م');
            
            return `
                <div class="p-box ${isActive ? 'active' : ''}">
                    <div class="name">${p.n}</div>
                    <div class="time">${timeStr}</div>
                </div>
            `;
        }).join('');
    }

    const azkar = [
        "«سبحان الله وبحمده، سبحان الله العظيم»",
        "«لا إله إلا الله وحده لا شريك له، له الملك وله الحمد وهو على كل شيء قدير»",
        "«اللهم صلِ وسلم على نبينا محمد»",
        "«اللهم أعنا على ذكرك وشكرك وحسن عبادتك»"
    ];
    let zIdx = 0;
    setInterval(() => {
        zIdx = (zIdx + 1) % azkar.length;
        document.getElementById('zikr-text').innerText = azkar[zIdx];
    }, 30000);

    setInterval(updateDashboard, 1000);
    updateDashboard();
</script>
</body>
</html>
