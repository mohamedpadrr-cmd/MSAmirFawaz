<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مواقيت الصلاة - جامع الأمير فواز</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/adhan@4.4.1/dist/Adhan.min.js"></script>
    <style>
        :root { --gold: #b2945e; --neon-green: #00ff00; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: #000 url('https://images.unsplash.com/photo-1591604129939-f1efa4d9f7fa?q=80&w=2000') center/cover no-repeat;
            color: white; font-family: 'Tajawal', sans-serif; height: 100vh; overflow: hidden;
        }

        /* الطبقة المظلمة فوق الخلفية لجعل الكلام واضح */
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); z-index: 1; }
        .wrapper { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; }

        /* الشريط العلوي الأسود */
        .top-bar { 
            background: rgba(0, 0, 0, 0.9); display: flex; justify-content: space-between; 
            padding: 15px 50px; border-bottom: 2px solid var(--gold); font-size: 1.8rem; font-weight: bold;
        }

        /* المحتوى الرئيسي (الساعة واللوحة) */
        .main-content { 
            display: grid; grid-template-columns: 350px 1fr; gap: 30px; 
            padding: 30px; flex: 1; align-items: stretch;
        }

        /* صندوق الساعة (يسار) */
        .left-panel { 
            background: rgba(0,0,0,0.85); border: 2px solid var(--gold); 
            border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .analog-clock-ui { 
            width: 200px; height: 200px; border: 6px solid #fff; border-radius: 50%; 
            position: relative; margin-bottom: 20px; box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
        #digi-time { font-size: 7.5rem; font-weight: 900; color: var(--neon-green); line-height: 1; }
        #ampm { font-size: 2.5rem; color: var(--neon-green); margin-bottom: 15px; }
        .next-p-timer { color: #fff; font-size: 1.3rem; border-top: 1px solid #333; pt-10px; width: 80%; text-align: center; padding-top: 15px; }

        /* لوحة الأذكار (منتصف) */
        .center-panel { 
            background: rgba(253, 246, 227, 0.98); border-radius: 30px; 
            border: 6px solid var(--gold); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 50px; text-align: center; color: #1a1a1a;
            position: relative;
        }
        .quote-label { 
            position: absolute; top: 0; right: 50px; background: #222; 
            color: var(--gold); padding: 8px 30px; border-radius: 0 0 15px 15px; font-size: 1.4rem; 
        }
        #zikr-text { font-size: 3.2rem; font-weight: 900; line-height: 1.5; margin-bottom: 20px; }

        /* شريط المواقيت السفلي */
        .bottom-grid { 
            display: grid; grid-template-columns: repeat(6, 1fr); 
            height: 160px; background: rgba(0,0,0,0.95); border-top: 3px solid var(--gold);
        }
        .p-box { 
            border-left: 1px solid #222; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
        }
        .p-box.active { background: #1a3a1a; border-top: 6px solid var(--neon-green); }
        .p-box .name { font-size: 1.8rem; color: var(--gold); margin-bottom: 5px; }
        .p-box .time { font-size: 3.2rem; font-weight: 900; color: #fff; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="wrapper">
        <div class="top-bar">
            <div id="en-date">Tuesday, March 3, 2026</div>
            <div style="color:#fff">مواقيت المسجد</div>
            <div id="ar-date">الثلاثاء، ٣ مارس ٢٠٢٦</div>
        </div>

        <div class="main-content">
            <div class="left-panel">
                <div class="analog-clock-ui">
                    <div style="position:absolute; top:50%; left:50%; width:4px; height:50px; background:#fff; transform-origin:bottom; transform:translate(-50%, -100%) rotate(10deg);"></div>
                    <div style="position:absolute; top:50%; left:50%; width:2px; height:70px; background:red; transform-origin:bottom; transform:translate(-50%, -100%) rotate(150deg);"></div>
                </div>
                <div id="digi-time">07:18</div>
                <div id="ampm">صباحاً</div>
                <div class="next-p-timer" id="next-timer">المغرب بعد: --:--</div>
            </div>

            <div class="center-panel">
                <div class="quote-label">من أقوال السلف</div>
                <div id="zikr-text">«للعبد بين يدي الله موقفان: موقف في الصلاة، وموقف يوم لقائه، فمن قام بحق الموقف الأول هُوِّن عليه الموقف الآخر».</div>
                <div style="color:#666; font-size:1.2rem">[الفوائد ص 100]</div>
            </div>
        </div>

        <div class="bottom-grid" id="prayer-list"></div>
    </div>

<script>
    function updateDashboard() {
        const now = new Date();
        
        // 1. الوقت الرقمي
        let h = now.getHours();
        const m = String(now.getMinutes()).padStart(2, '0');
        const displayH = h % 12 || 12;
        document.getElementById('digi-time').innerText = `${displayH}:${m}`;
        document.getElementById('ampm').innerText = h >= 12 ? 'مساءً' : 'صباحاً';

        // 2. التواريخ
        document.getElementById('en-date').innerText = now.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'});
        document.getElementById('ar-date').innerText = now.toLocaleDateString('ar-SA', {weekday:'long', day:'numeric', month:'long', year:'numeric'});

        // 3. حساب المواقيت (جدة)
        const coords = new adhan.Coordinates(21.4858, 39.1925);
        const params = adhan.CalculationMethod.UmmAlQura();
        const pTimes = new adhan.PrayerTimes(coords, now, params);

        const prayers = [
            { n: 'الفجر', t: pTimes.fajr, id: 'fajr' },
            { n: 'الشروق', t: pTimes.sunrise, id: 'sunrise' },
            { n: 'الظهر', t: pTimes.dhuhr, id: 'dhuhr' },
            { n: 'العصر', t: pTimes.asr, id: 'asr' },
            { n: 'المغرب', t: pTimes.maghrib, id: 'maghrib' },
            { n: 'العشاء', t: pTimes.isha, id: 'isha' }
        ];

        const currentP = pTimes.currentPrayer();
        const grid = document.getElementById('prayer-list');
        grid.innerHTML = prayers.map(p => `
            <div class="p-box ${currentP === p.id ? 'active' : ''}">
                <div class="name">${p.n}</div>
                <div class="time">${p.t.toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit', hour12:false})}</div>
            </div>
        `).join('');
    }

    // الأذكار المتغيرة (كل 30 ثانية)
    const azkar = [
        "«للعبد بين يدي الله موقفان: موقف في الصلاة، وموقف يوم لقائه، فمن قام بحق الموقف الأول هُوِّن عليه الموقف الآخر».",
        "«أقرب ما يكون العبد من ربه وهو ساجد، فأكثروا الدعاء».",
        "«الصلاة عماد الدين، من أقامها فقد أقام الدين ومن هدمها فقد هدم الدين».",
        "«سبحان الله وبحمده، سبحان الله العظيم»"
    ];
    let zIndex = 0;
    setInterval(() => {
        zIndex = (zIndex + 1) % azkar.length;
        document.getElementById('zikr-text').innerText = azkar[zIndex];
    }, 30000);

    setInterval(updateDashboard, 1000);
    updateDashboard();
</script>
</body>
</html>
