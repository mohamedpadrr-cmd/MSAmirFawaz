<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شاشة جامع الأمير فواز</title>

<style>
:root{
--gold:#D4AF37;
--white:#F5F5F5;
--glass:rgba(0,0,0,0.45);
--iqama-color: #00FFCC; /* لون وقت الإقامة */
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Tajawal',sans-serif;
}

body{
background:#000;
width:100vw;
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

.main-container{
transform:rotate(90deg);
width:100vh;
height:100vw;
display:flex;
flex-direction:column;
background:
linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.5)),
url("bg.png") center/cover no-repeat;
position:absolute;
}

/* القسم العلوي */
.top-section{
height:40vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:2vh;
margin-top:1cm;
}

.name-box{
background:var(--glass);
backdrop-filter:blur(10px);
padding:2vh 4vw;
border-radius:30px;
border:2px solid rgba(212,175,55,.6);
text-align:center;
min-width: 60vh;
}

.mosque-name{
font-size:7vh;
color:white;
text-shadow:0 0 20px var(--gold);
margin-bottom: 10px;
}

.date-container {
display: flex;
flex-direction: column;
gap: 5px;
border-top: 1px solid rgba(212,175,55,0.3);
padding-top: 10px;
}

.date-info{
font-size:3.8vh;
color:var(--gold);
font-weight:700;
}

.date-info.miladi {
color: #fff;
font-size: 3vh;
}

/* الساعة */
.clock-box{
background:var(--glass);
backdrop-filter:blur(10px);
padding:2vh 5vw;
border-radius:30px;
border:2px solid rgba(212,175,55,.6);
display:flex;
align-items:center;
justify-content:center;
gap:2vw;
}

#clock{
font-size:16vh;
font-weight:900;
color:var(--gold);
line-height:1;
text-shadow:0 0 10px #000, 0 0 30px rgba(212,175,55,0.4);
}

#ampm{
font-size:5vh;
color:white;
font-weight:700;
}

/* الأذكار */
.zikr-section{
height: 12vh;
display:flex;
align-items:center;
justify-content:center;
padding:0 5vw;
text-align:center;
}

#zikr{
font-size:5.5vh;
font-weight:800;
color:white;
line-height:1.3;
text-shadow:3px 3px 15px black;
transition:opacity .7s;
}

/* قسم الصلوات */
.prayer-section{
flex: 1;
display:flex;
flex-direction:column;
border-top:4px solid var(--gold);
background:rgba(0,0,0,0.6);
backdrop-filter:blur(15px);
}

.next-prayer-box{
background:rgba(212,175,55,0.2);
padding:1.5vh;
text-align:center;
border-bottom:2px solid var(--gold);
}

#timer-label{ font-size:3.5vh; color:white; }
#timer{ font-size:8vh; color:var(--gold); font-weight:900; margin-right: 15px;}

/* جدول الصلوات */
.prayer-header {
display: grid;
grid-template-columns: 1.5fr 1fr 1fr;
padding: 1.5vh 4vw;
color: var(--gold);
font-size: 3.5vh;
font-weight: bold;
text-align: center;
background: rgba(255,255,255,0.05);
}

.prayer-grid{
flex:1;
display:flex;
flex-direction: column;
justify-content: space-evenly;
padding: 1vh 2vw;
}

.prayer-item{
display: grid;
grid-template-columns: 1.5fr 1fr 1fr;
align-items:center;
padding: 1.2vh 2vw;
border-radius: 20px;
text-align: center;
transition: 0.5s;
}

.p-name{
font-size:5.5vh;
color:white;
font-weight:800;
text-align: right;
padding-right: 3vw;
}

.p-val{
font-size:6.5vh;
color:var(--gold);
font-weight:900;
}

.iqama-val {
font-size: 6vh;
color: var(--iqama-color);
font-weight: 800;
}

.next-prayer{
background:rgba(212,175,55,0.35);
box-shadow: 0 0 30px rgba(212,175,55,0.2);
transform: scale(1.02);
}

</style>
</head>

<body>

<div class="main-container">
    <!-- الجزء العلوي: الاسم والتاريخ والساعة -->
    <div class="top-section">
        <div class="name-box">
            <div class="mosque-name">جامع الأمير فواز</div>
            <div class="date-container">
                <div id="hijri" class="date-info">--</div>
                <div id="miladi" class="date-info miladi">--</div>
            </div>
        </div>

        <div class="clock-box">
            <div id="clock">00:00</div>
            <div id="ampm">--</div>
        </div>
    </div>

    <!-- شريط الأذكار -->
    <div class="zikr-section">
        <div id="zikr">بسم الله الرحمن الرحيم</div>
    </div>

    <!-- جدول مواقيت الصلاة -->
    <div class="prayer-section">
        <div class="next-prayer-box">
            <span id="timer-label">الصلاة القادمة بعد</span>
            <span id="timer">00:00:00</span>
        </div>

        <div class="prayer-header">
            <div style="text-align: right; padding-right: 3vw;">الصلاة</div>
            <div>الأذان</div>
            <div>الإقامة</div>
        </div>

        <div class="prayer-grid" id="prayerContainer">
            <!-- يتم توليد الصفوف برمجياً -->
        </div>
    </div>
</div>

<script>
/* إعدادات المواقيت بناءً على طلبك */
const prayerData=[
    {n:"الفجر", h:5, m:10, iqama:25},
    {n:"الشروق", h:6, m:34, iqama:0},
    {n:"الظهر", h:12, m:20, iqama:15},
    {n:"العصر", h:15, m:34, iqama:15},
    {n:"المغرب", h:18, m:6, iqama:10},
    {n:"العشاء", h:19, m:31, iqama:20}
];

const azkar=[
    "سبحان الله وبحمده سبحان الله العظيم",
    "اللهم صل وسلم على نبينا محمد",
    "أستغفر الله العظيم وأتوب إليه",
    "لا حول ولا قوة إلا بالله",
    "سبحان الله والحمد لله والله أكبر",
    "اللهم أعنا على ذكرك وشكرك وحسن عبادتك"
];

function formatTime(h, m) {
    let suf = h >= 12 ? "م" : "ص";
    let h12 = h % 12 || 12;
    return `${String(h12).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function calculateIqama(h, m, offsetMinutes) {
    if (offsetMinutes === 0) return "--:--";
    let totalMinutes = h * 60 + m + offsetMinutes;
    let newH = Math.floor(totalMinutes / 60) % 24;
    let newM = totalMinutes % 60;
    
    let suf = newH >= 12 ? "م" : "ص";
    let h12 = newH % 12 || 12;
    return `${String(h12).padStart(2,'0')}:${String(newM).padStart(2,'0')}`;
}

function init(){
    const container = document.getElementById("prayerContainer");
    container.innerHTML = "";

    prayerData.forEach((p, i) => {
        let prayerTime = formatTime(p.h, p.m);
        let iqamaTime = calculateIqama(p.h, p.m, p.iqama);
        let suf = p.h >= 12 ? "م" : "ص";

        container.innerHTML += `
            <div class="prayer-item" id="prayer-${i}">
                <div class="p-name">${p.n}</div>
                <div class="p-val">${prayerTime}<small style="font-size:3vh; margin-right:5px">${suf}</small></div>
                <div class="iqama-val">${iqamaTime}</div>
            </div>`;
    });
}

function update(){
    const now = new Date();
    // ضبط التوقيت المحلي (السعودية)
    const riyadhOptions = { timeZone: "Asia/Riyadh", hour12: false };
    const rTimeStr = now.toLocaleString("en-US", riyadhOptions);
    const rDate = new Date(rTimeStr);
    
    let h = rDate.getHours();
    let m = rDate.getMinutes();
    let s = rDate.getSeconds();

    let ampm = h >= 12 ? "مساءً" : "صباحاً";
    let h12 = h % 12 || 12;

    document.getElementById("clock").innerText = `${String(h12).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    document.getElementById("ampm").innerText = ampm;

    // التاريخ الميلادي (يوم شهر سنة)
    const miladiOptions = { day: 'numeric', month: 'long', year: 'numeric' };
    document.getElementById("miladi").innerText = now.toLocaleDateString('ar-EG', miladiOptions);
    
    // التاريخ الهجري
    const hijriOptions = { day: 'numeric', month: 'long', year: 'numeric' };
    document.getElementById("hijri").innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', hijriOptions).format(now);

    /* تحديد الصلاة القادمة */
    let currentTotalSeconds = h * 3600 + m * 60 + s;
    let nextIndex = 0;
    let nextTotalSeconds = 0;

    for(let i=0; i<prayerData.length; i++){
        let p = prayerData[i];
        let pSeconds = p.h * 3600 + p.m * 60;
        if(pSeconds > currentTotalSeconds){
            nextTotalSeconds = pSeconds;
            nextIndex = i;
            break;
        }
    }

    // إذا انتهت صلوات اليوم
    if(!nextTotalSeconds){
        nextTotalSeconds = prayerData[0].h * 3600 + prayerData[0].m * 60 + 86400;
        nextIndex = 0;
    }

    document.querySelectorAll(".prayer-item").forEach(el => el.classList.remove("next-prayer"));
    document.getElementById("prayer-"+nextIndex).classList.add("next-prayer");

    // تحديث العداد
    let diff = nextTotalSeconds - currentTotalSeconds;
    let hh = Math.floor(diff/3600);
    let mm = Math.floor((diff%3600)/60);
    let ss = diff%60;
    document.getElementById("timer").innerText = 
        `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}

init();
update();
setInterval(update, 1000);

// تبديل الأذكار كل 15 ثانية
let z=0;
setInterval(()=>{
    const el=document.getElementById("zikr");
    el.style.opacity=0;
    setTimeout(()=>{
        z=(z+1)%azkar.length;
        el.innerText=azkar[z];
        el.style.opacity=1;
    },600);
},15000);
</script>

</body>
</html>
