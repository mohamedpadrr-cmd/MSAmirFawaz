<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شاشة جامع الأمير فواز</title>
<style>
:root{
--gold:#D4AF37;
--white:#F5F5F5;
--glass:rgba(0,0,0,0.35);
--iqama-color: #00FFCC;
}

*{ margin:0; padding:0; box-sizing:border-box; font-family:'Tajawal',sans-serif; }

body{
background:#000;
width:100vw; height:100vh;
overflow:hidden;
display:flex; align-items:center; justify-content:center;
}

.main-container{
transform:rotate(90deg);
width:100vh; height:100vw;
display:flex; flex-direction:column;
background: linear-gradient(rgba(0,0,0,.2),rgba(0,0,0,.4)), url("bg.png") center/cover no-repeat;
position:absolute;
}

/* القسم العلوي */
.top-section{
height:28vh;
display:flex; flex-direction:column;
align-items:center; justify-content:center;
gap:1vh; margin-top:2vh;
}

.name-box{
background:var(--glass);
backdrop-filter:blur(8px);
padding:1vh 3vw; border-radius:20px;
border:1px solid rgba(212,175,55,.3);
text-align:center; min-width: 45vh;
}

.mosque-name{ font-size:4.2vh; color:white; text-shadow:0 0 10px var(--gold); }
.date-container { border-top: 1px solid rgba(212,175,55,0.2); padding-top: 5px; }
.date-info{ font-size:2.5vh; color:var(--gold); font-weight:700; }
.date-info.miladi { color: #fff; font-size: 2vh; opacity: 0.8; }

.clock-box{
background:var(--glass); backdrop-filter:blur(8px);
padding:1vh 4vw; border-radius:20px;
border:1px solid rgba(212,175,55,.3);
display:flex; align-items:center; gap:1.5vw;
}
#clock{ font-size:9vh; font-weight:900; color:var(--gold); text-shadow:0 0 10px #000; }
#ampm{ font-size:3.2vh; color:white; }

/* قسم الأذكار */
.zikr-section{
flex: 1; 
display:flex; align-items:center; justify-content:center;
}
#zikr{ font-size:4.2vh; font-weight:700; color:white; text-shadow:2px 2px 10px black; text-align:center; padding:0 8vw; }

/* قسم الصلوات في الأسفل */
.prayer-section{
width: 100%;
display:flex; flex-direction:column;
background:rgba(0,0,0,0.65);
backdrop-filter:blur(15px);
border-top:3px solid var(--gold);
padding-bottom: 1.5vh;
}

.next-prayer-box{
background:rgba(212,175,55,0.15);
padding:0.5vh; text-align:center;
border-bottom:1px solid var(--gold);
margin-bottom: 0.5vh;
}
#timer-label{ font-size:2.5vh; color:white; }
#timer{ font-size:5vh; color:var(--gold); font-weight:900; }

.prayer-header {
display: grid; grid-template-columns: 1.5fr 1fr 1fr;
padding: 0.5vh 5vw; color: var(--gold);
font-size: 2.2vh; font-weight: bold; text-align: center;
}

.prayer-grid{ 
display:flex; flex-direction: column; 
gap: 2px;
padding: 0 3vw;
}

.prayer-item{ 
display: grid; 
grid-template-columns: 1.5fr 1fr 1fr; 
align-items:center; 
padding: 0.6vh 2vw; 
text-align: center; 
border-radius: 10px;
}

.p-name{ font-size:3.6vh; color:white; font-weight:800; text-align: right; padding-right: 5vw; }
.p-val{ font-size:4vh; color:var(--gold); font-weight:900; }
.iqama-val { font-size:3.6vh; color: var(--iqama-color); font-weight: 800; }

.next-prayer{ 
background:rgba(212,175,55,0.25); 
box-shadow: inset 0 0 15px rgba(212,175,55,0.2);
}
</style>
</head>
<body>
<div class="main-container">
    <div class="top-section">
        <div class="name-box">
            <div class="mosque-name">جامع الأمير فواز</div>
            <div class="date-container">
                <div id="hijri" class="date-info">--</div>
                <div id="miladi" class="date-info miladi">--</div>
            </div>
        </div>
        <div class="clock-box">
            <div id="clock">00:00</div>
            <div id="ampm">--</div>
        </div>
    </div>

    <div class="zikr-section">
        <div id="zikr">بسم الله الرحمن الرحيم</div>
    </div>

    <div class="prayer-section">
        <div class="next-prayer-box">
            <span id="timer-label">الصلاة القادمة بعد</span>
            <span id="timer">00:00:00</span>
        </div>
        <div class="prayer-header">
            <div style="text-align: right; padding-right: 5vw;">الصلاة</div>
            <div>الأذان</div>
            <div>الإقامة</div>
        </div>
        <div class="prayer-grid" id="prayerContainer"></div>
    </div>
</div>

<script>
const prayerData=[
    {n:"الفجر", h:5, m:10, iqama:25},
    {n:"الشروق", h:6, m:34, iqama:0},
    {n:"الظهر", h:12, m:20, iqama:15},
    {n:"العصر", h:15, m:34, iqama:15},
    {n:"المغرب", h:18, m:6, iqama:10},
    {n:"العشاء", h:19, m:31, iqama:20}
];

const azkar=["سبحان الله وبحمده","اللهم صل وسلم على نبينا محمد","أستغفر الله العظيم","لا حول ولا قوة إلا بالله","سبحان الله والحمد لله والله أكبر"];

function formatTime(h, m) {
    let h12 = h % 12 || 12;
    return `${String(h12).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function calculateIqama(h, m, offset) {
    if (offset === 0) return "--:--";
    let total = h * 60 + m + offset;
    return formatTime(Math.floor(total / 60) % 24, total % 60);
}

function init(){
    const container = document.getElementById("prayerContainer");
    container.innerHTML = "";
    prayerData.forEach((p, i) => {
        let suf = p.h >= 12 ? "م" : "ص";
        container.innerHTML += `
            <div class="prayer-item" id="prayer-${i}">
                <div class="p-name">${p.n}</div>
                <div class="p-val">${formatTime(p.h, p.m)} <small style="font-size:1.8vh">${suf}</small></div>
                <div class="iqama-val">${calculateIqama(p.h, p.m, p.iqama)}</div>
            </div>`;
    });
}

function update(){
    const now = new Date();
    const rDate = new Date(now.toLocaleString("en-US", {timeZone: "Asia/Riyadh"}));
    let h = rDate.getHours(), m = rDate.getMinutes(), s = rDate.getSeconds();
    
    document.getElementById("clock").innerText = formatTime(h, m);
    document.getElementById("ampm").innerText = h >= 12 ? "مساءً" : "صباحاً";
    document.getElementById("miladi").innerText = now.toLocaleDateString('ar-EG', {day:'numeric', month:'long', year:'numeric'});
    document.getElementById("hijri").innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', {day:'numeric', month:'long', year:'numeric'}).format(now);

    let currentS = h * 3600 + m * 60 + s;
    let nextIdx = 0;
    let nextS = 0;

    // إصلاح مشكلة NaN من خلال فحص جميع مواقيت الصلاة
    for(let i=0; i<prayerData.length; i++){
        let ps = prayerData[i].h * 3600 + prayerData[i].m * 60;
        if(ps > currentS){
            nextS = ps;
            nextIdx = i;
            break;
        }
    }

    // إذا انتهت صلوات اليوم، الصلاة القادمة هي فجر اليوم التالي
    if(nextS === 0){
        nextS = (prayerData[0].h * 3600 + prayerData[0].m * 60) + 86400; // إضافة ثواني يوم كامل
        nextIdx = 0;
    }

    document.querySelectorAll(".prayer-item").forEach(el => el.classList.remove("next-prayer"));
    document.getElementById("prayer-"+nextIdx).classList.add("next-prayer");

    let diff = nextS - currentS;
    let hh = Math.floor(diff/3600);
    let mm = Math.floor((diff%3600)/60);
    let ss = diff%60;
    
    document.getElementById("timer").innerText = 
        `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}

init(); update(); setInterval(update, 1000);
let z=0; setInterval(()=>{ const el=document.getElementById("zikr"); el.style.opacity=0; setTimeout(()=>{ z=(z+1)%azkar.length; el.innerText=azkar[z]; el.style.opacity=1; },600); },15000);
</script>
</body>
</html>
