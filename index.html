<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مواقيت الصلاة - جامع الأمير فواز</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #b2945e; 
            --neon-green: #00ff00; 
            --sky-blue: #005f73; /* سماوي عميق وفخم */
            --panel-bg: rgba(0, 95, 115, 0.85); 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: #00344d url('https://images.unsplash.com/photo-1591604129939-f1efa4d9f7fa?q=80&w=2000') center/cover no-repeat;
            color: white; font-family: 'Tajawal', sans-serif; height: 100vh; overflow: hidden;
        }

        .overlay { position: absolute; inset: 0; background: rgba(0, 40, 60, 0.7); z-index: 1; }
        .wrapper { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; }

        .top-bar { 
            background: rgba(0, 50, 70, 0.95); display: flex; justify-content: space-between; 
            padding: 15px 50px; border-bottom: 2px solid var(--gold); font-size: 1.8rem; font-weight: bold;
        }

        .main-content { 
            display: grid; grid-template-columns: 380px 1fr; gap: 30px; 
            padding: 30px; flex: 1; align-items: stretch;
        }

        .left-panel { 
            background: var(--panel-bg); border: 2px solid var(--gold); 
            border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #digi-time { font-size: 8rem; font-weight: 900; color: var(--neon-green); line-height: 1; }
        #ampm { font-size: 2.5rem; color: var(--neon-green); margin-bottom: 15px; }

        .center-panel { 
            background: rgba(255, 255, 255, 0.96); border-radius: 30px; 
            border: 6px solid var(--gold); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 60px; text-align: center; color: #00344d;
        }
        
        #zikr-text { font-size: 3.5rem; font-weight: 900; line-height: 1.6; }

        .bottom-grid { 
            display: grid; grid-template-columns: repeat(6, 1fr); 
            height: 180px; background: rgba(0, 30, 45, 0.95); border-top: 3px solid var(--gold);
        }
        .p-box { 
            border-left: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
        }
        .p-box.active { background: #0a9396; border-top: 8px solid var(--neon-green); }
        .p-box .name { font-size: 1.8rem; color: var(--gold); margin-bottom: 5px; }
        .p-box .time { font-size: 2.3rem; font-weight: 900; color: #fff; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="wrapper">
        <div class="top-bar">
            <div id="en-date">Tuesday, March 3, 2026</div>
            <div style="color:var(--gold)">جامع الأمير فواز - جدة</div>
            <div id="ar-date">جاري التحميل...</div>
        </div>

        <div class="main-content">
            <div class="left-panel">
                <div id="digi-time">00:00</div>
                <div id="ampm">--</div>
                <div style="color:#fff; font-size:1.6rem; border-top:1px solid rgba(255,255,255,0.2); padding-top:15px; width:80%; text-align:center;">
                    الصلاة القادمة: <br>
                    <span id="next-prayer-name" style="color:var(--neon-green); font-weight:bold; font-size:2rem;">--</span>
                </div>
            </div>

            <div class="center-panel">
                <div id="zikr-text">«سبحان الله وبحمده، سبحان الله العظيم»</div>
            </div>
        </div>

        <div class="bottom-grid" id="prayer-list"></div>
    </div>

<script>
    // جدول مواقيت جدة (مارس 2026) لضمان الظهور الفوري
    const prayerSchedule = [
        { n: 'الفجر', t: '5:21 ص' },
        { n: 'الشروق', t: '6:38 ص' },
        { n: 'الظهر', t: '12:31 م' },
        { n: 'العصر', t: '3:52 م' },
        { n: 'المغرب', t: '6:24 م' },
        { n: 'العشاء', t: '7:54 م' }
    ];

    function updateDashboard() {
        const now = new Date();
        
        // 1. الوقت
        let h = now.getHours();
        const m = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('digi-time').innerText = `${h % 12 || 12}:${m}`;
        document.getElementById('ampm').innerText = h >= 12 ? 'مساءً' : 'صباحاً';

        // 2. التواريخ
        document.getElementById('en-date').innerText = now.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'});
        document.getElementById('ar-date').innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura', {day:'numeric', month:'long', year:'numeric', weekday:'long'}).format(now);

        // 3. عرض المواقيت وتحديد الصلاة القادمة
        const grid = document.getElementById('prayer-list');
        const currentMinutes = h * 60 + now.getMinutes();
        
        let nextIndex = 0;
        // حساب بسيط لتحديد الصلاة القادمة بناءً على الوقت الحالي
        if (currentMinutes > (19 * 60 + 54)) nextIndex = 0; // بعد العشاء الصلاة القادمة الفجر
        else if (currentMinutes > (18 * 60 + 24)) nextIndex = 5;
        else if (currentMinutes > (15 * 60 + 52)) nextIndex = 4;
        else if (currentMinutes > (12 * 60 + 31)) nextIndex = 3;
        else if (currentMinutes > (6 * 60 + 38)) nextIndex = 2;
        else if (currentMinutes > (5 * 60 + 21)) nextIndex = 1;
        else nextIndex = 0;

        document.getElementById('next-prayer-name').innerText = prayerSchedule[nextIndex].n;

        grid.innerHTML = prayerSchedule.map((p, index) => `
            <div class="p-box ${index === nextIndex ? 'active' : ''}">
                <div class="name">${p.n}</div>
                <div class="time">${p.t}</div>
            </div>
        `).join('');
    }

    const azkar = [
        "«سبحان الله وبحمده، سبحان الله العظيم»",
        "«لا إله إلا الله وحده لا شريك له، له الملك وله الحمد وهو على كل شيء قدير»",
        "«اللهم صلِ وسلم على نبينا محمد»",
        "«اللهم أعنا على ذكرك وشكرك وحسن عبادتك»"
    ];
    let zIdx = 0;
    setInterval(() => {
        zIdx = (zIdx + 1) % azkar.length;
        document.getElementById('zikr-text').innerText = azkar[zIdx];
    }, 20000);

    setInterval(updateDashboard, 1000);
    updateDashboard();
</script>
</body>
</html>
