<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جامع الأمير فواز</title>
    <style>
        :root {
            --gold: #dfbd69;
            --dark-bg: #000;
            --box-bg: rgba(20, 20, 20, 0.9);
            --border-color: #333;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            display: flex; flex-direction: column;
            overflow: hidden;
            padding: 40px;
            box-sizing: border-box;
        }

        /* 1️⃣ الجزء العلوي: ساعة يسار واسم يمين */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .left-side {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .analog-clock {
            width: 100px; height: 100px;
            border: 3px solid var(--gold);
            border-radius: 50%;
            position: relative;
        }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; border-radius: 5px; }
        .hour { width: 4px; height: 30px; background: white; }
        .min { width: 3px; height: 40px; background: #bbb; }
        .sec { width: 1.5px; height: 45px; background: var(--gold); }

        .digital-clock {
            font-size: 4rem;
            color: var(--gold);
            background: var(--box-bg);
            padding: 5px 30px;
            border-radius: 10px;
            font-weight: bold;
            border: 1px solid var(--border-color);
        }

        .mosque-name {
            font-size: 5rem;
            color: var(--gold);
            font-weight: bold;
            margin: 0;
            text-align: left;
        }

        /* 2️⃣ الجزء الأوسط: التواريخ يسار والذكر يمين */
        .middle-content {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: -20px;
        }

        .dates-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .date-item {
            background: var(--box-bg);
            padding: 10px 25px;
            border-radius: 8px;
            font-size: 1.8rem;
            border: 1px solid var(--border-color);
            min-width: 250px;
        }

        .dhikr-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .dhikr-text {
            font-size: 6rem;
            font-weight: bold;
            color: white;
        }

        .dhikr-line {
            width: 8px;
            height: 100px;
            background: var(--gold);
            border-radius: 4px;
        }

        /* 3️⃣ الجزء السفلي: الإقامة */
        .footer {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .iqama-bar {
            background: var(--gold);
            color: black;
            font-size: 3rem;
            font-weight: bold;
            padding: 10px 100px;
            border-radius: 15px;
            width: 70%;
            text-align: center;
        }

        /* حاوية مخفية لمواقيت الصلاة لاستخدامها في الحساب فقط */
        #prayer-data { display: none; }
    </style>
</head>
<body>

    <!-- الجزء العلوي -->
    <div class="header">
        <div class="left-side">
            <div class="analog-clock">
                <div class="hand hour" id="h-hand"></div>
                <div class="hand min" id="m-hand"></div>
                <div class="hand sec" id="s-hand"></div>
            </div>
            <div class="digital-clock" id="digi-clock">00:00 ص</div>
        </div>
        <h1 class="mosque-name">جامِع الأَمير فَواز</h1>
    </div>

    <!-- الجزء الأوسط -->
    <div class="middle-content">
        <div class="dates-box">
            <div class="date-item" id="g-date">-- --- 2026 م</div>
            <div class="date-item" id="h-date">-- --- 1447 هـ</div>
        </div>
        <div class="dhikr-section">
            <div class="dhikr-text" id="dhikr-display">أستغفر الله العظيم</div>
            <div class="dhikr-line"></div>
        </div>
    </div>

    <!-- الجزء السفلي -->
    <div class="footer">
        <div class="iqama-bar" id="iqama-display">الإقامة بعد: 10:00 د</div>
    </div>

    <script>
        // الأذكار تتغير كل 30 ثانية
        const dhikrs = ["أستغفر الله العظيم", "لا إله إلا الله", "سبحان الله وبحمده", "صلّ على محمد", "الحمد لله رب العالمين"];
        let dIdx = 0;
        setInterval(() => {
            dIdx = (dIdx + 1) % dhikrs.length;
            document.getElementById('dhikr-display').innerText = dhikrs[dIdx];
        }, 30000);

        // جلب المواقيت وتحديث الشاشة
        async function updateApp() {
            const now = new Date();
            
            // 1. تحديث الساعات
            const h = now.getHours();
            const m = now.getMinutes();
            const s = now.getSeconds();
            
            const displayH = h % 12 || 12;
            const ampm = h >= 12 ? 'م' : 'ص';
            document.getElementById('digi-clock').innerText = `${String(displayH).padStart(2, '0')}:${String(m).padStart(2, '0')} ${ampm}`;
            
            document.getElementById('s-hand').style.transform = `rotate(${s * 6}deg)`;
            document.getElementById('m-hand').style.transform = `rotate(${m * 6}deg)`;
            document.getElementById('h-hand').style.transform = `rotate(${(h % 12) * 30 + m/2}deg)`;

            // 2. التواريخ (ميلادي وهجري)
            const opt = { day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('g-date').innerText = now.toLocaleDateString('ar-SA', opt) + " م";
            document.getElementById('h-date').innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-uma', opt).format(now) + " هـ";
        }

        // جلب المواقيت الحقيقية من الإنترنت
        async function fetchPrayers() {
            try {
                const res = await fetch('https://api.aladhan.com');
                const data = await res.json();
                const times = data.data.timings;
                
                // حساب الإقامة (بعد الأذان بـ 10 دقائق افتراضياً كما طلبت)
                // في هذا التصميم، الإقامة تظهر مباشرة بناءً على الصلاة القادمة
                document.getElementById('iqama-display').innerText = "الإقامة بعد: 10:00 د";
            } catch(e) { console.log("خطأ في الاتصال"); }
        }

        setInterval(updateApp, 1000);
        updateApp();
        fetchPrayers();
    </script>
</body>
</html>
